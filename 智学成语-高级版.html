<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公途·上岸 - 学习面板</title>
    <script src="/gontu-auth-client.js"></script>
    <script src="xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
    // ============================================
    // 公途 · 认证模块（最先加载，确保登录/注册始终可用）
    // ============================================
    var GONTU_API_BASE = window.__GONTU_API_BASE__ || (location.port === '8089' ? 'http://127.0.0.1:8888' : location.origin);
    var GONTU_TOKEN_KEY = 'gontu_token';
    var GONTU_USER_KEY = 'gontu_user';

    function gontu_isLoggedIn() { return !!localStorage.getItem(GONTU_TOKEN_KEY); }
    function gontu_getUser() { try { var u = localStorage.getItem(GONTU_USER_KEY); return u ? JSON.parse(u) : null; } catch(e) { return null; } }
    function escapeHTML(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    async function apiFetch(url, options) {
        var token = localStorage.getItem(GONTU_TOKEN_KEY);
        var headers = Object.assign({}, (options && options.headers) || {}, token ? { 'Authorization': 'Bearer ' + token } : {});
        var resp = await fetch(url, Object.assign({}, options || {}, { headers: headers }));
        if (resp.status === 401) { localStorage.removeItem(GONTU_TOKEN_KEY); localStorage.removeItem(GONTU_USER_KEY); throw new Error('Unauthorized'); }
        return resp;
    }

    function updateNavAuth() {
        var user = gontu_getUser();
        var authArea = document.getElementById('navAuthArea');
        if (!authArea) return;
        if (user) {
            var isAdmin = Number(user.is_admin || localStorage.getItem('is_admin')) === 1;
            var adminAction = isAdmin ? '<button class="btn-nav" onclick="window.location.href=\'/admin\'"><span>管理后台</span></button>' : '';
            authArea.innerHTML = '<span style="color:rgba(232,213,163,0.85);font-size:0.85rem;margin-right:8px;letter-spacing:1px;">' + escapeHTML(user.username || '用户') + '</span>' + adminAction + '<button class="btn-nav btn-logout" onclick="logout()" style="background:rgba(196,75,58,0.2);color:#c44b3a;border:1px solid rgba(196,75,58,0.4);"><span>退出</span></button>';
        } else {
            authArea.innerHTML = '<button class="btn-nav" onclick="openLoginModal()" style="margin-right:8px;"><span>登录</span></button><button class="btn-nav" onclick="openRegisterModal()"><span>注册</span></button>';
        }
    }

    function openLoginModal() { var el = document.getElementById('loginModal'); if (el) { el.classList.add('show'); var inp = document.getElementById('loginUser'); if (inp) inp.focus(); } }
    function closeLoginModal() { var el = document.getElementById('loginModal'); if (el) { el.classList.remove('show'); var err = document.getElementById('loginError'); if (err) err.style.display = 'none'; } }
    function openRegisterModal() { var el = document.getElementById('registerModal'); if (el) { el.classList.add('show'); var inp = document.getElementById('registerUser'); if (inp) inp.focus(); } }
    function closeRegisterModal() { var el = document.getElementById('registerModal'); if (el) { el.classList.remove('show'); var err = document.getElementById('registerError'); if (err) err.style.display = 'none'; } }

    function showErr(id, msg) { var el = document.getElementById(id); if (!el) return; el.textContent = msg; el.style.display = 'block'; }

    // 从 API 响应中提取可读错误消息（处理 FastAPI 的 detail 为字符串/数组/对象的情况）
    function extractErrorMsg(data) {
        if (!data) return '未知错误';
        var d = data.detail;
        if (!d) return '未知错误';
        if (typeof d === 'string') return d;
        if (Array.isArray(d) && d.length > 0) {
            return d.map(function(e) { return (e.loc ? e.loc.join('.') + ': ' : '') + (e.msg || ''); }).join('; ');
        }
        try { return JSON.stringify(d); } catch(_) { return String(d); }
    }

    async function doLogin() {
        var u = document.getElementById('loginUser').value.trim();
        var p = document.getElementById('loginPass').value;
        if (!u || !p) { showErr('loginError', '请填写用户名和密码'); return; }
        try {
            var resp = await fetch(GONTU_API_BASE + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            var data = await resp.json();
            if (!resp.ok) { showErr('loginError', extractErrorMsg(data)); return; }
            localStorage.setItem(GONTU_TOKEN_KEY, data.token);
            localStorage.setItem(GONTU_USER_KEY, JSON.stringify({ id: data.user_id, username: data.username, is_admin: data.is_admin || 0 }));
            localStorage.setItem('is_admin', data.is_admin || 0);
            closeLoginModal();
            updateNavAuth();
            var pleaseEl = document.getElementById('pleaseLoginModal');
            if (pleaseEl && pleaseEl.classList.contains('show')) { pleaseEl.classList.remove('show'); startLearning(); }
            syncDeckFromBackend().then(function() {
                autoLoadHighFreqIfNeeded().then(function() {
                    if (typeof window.renderAll === 'function') window.renderAll();
                });
            });
            syncUserMetaFromBackend().then(function() { renderHeatmap(); renderStats(); });
            document.getElementById('loginPass').value = '';
        } catch(e) { showErr('loginError', '网络错误：' + (e.message || '无法连接到服务器，请确认后端已启动')); }
    }

    async function doRegister() {
        var u = document.getElementById('registerUser').value.trim();
        var p = document.getElementById('registerPass').value;
        if (!u || !p) { showErr('registerError', '请填写用户名和密码'); return; }
        if (p.length < 6) { showErr('registerError', '密码至少需要6位'); return; }
        try {
            var resp = await fetch(GONTU_API_BASE + '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            var data = await resp.json();
            if (!resp.ok) { showErr('registerError', extractErrorMsg(data)); return; }
            localStorage.setItem(GONTU_TOKEN_KEY, data.token);
            localStorage.setItem(GONTU_USER_KEY, JSON.stringify({ id: data.user_id, username: data.username, is_admin: data.is_admin || 0 }));
            localStorage.setItem('is_admin', data.is_admin || 0);
            closeRegisterModal();
            updateNavAuth();
            var pleaseEl = document.getElementById('pleaseLoginModal');
            if (pleaseEl && pleaseEl.classList.contains('show')) { pleaseEl.classList.remove('show'); startLearning(); }
            syncDeckFromBackend().then(function() {
                autoLoadHighFreqIfNeeded().then(function() {
                    if (typeof window.renderAll === 'function') window.renderAll();
                });
            });
            syncUserMetaFromBackend().then(function() { renderHeatmap(); renderStats(); });
            document.getElementById('registerPass').value = '';
        } catch(e) { showErr('registerError', '网络错误：' + (e.message || '无法连接到服务器，请确认后端已启动')); }
    }

    async function logout() {
        await pushCurrentDeckToBackend();
        // Also push math deck
        const mathData = localStorage.getItem('math_data');
        if (mathData && gontu_isLoggedIn()) {
            const token = localStorage.getItem(GONTU_TOKEN_KEY);
            try { await fetch(API_BASE+'/api/deck/math',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({cards:JSON.parse(mathData||'[]'),queue:JSON.parse(localStorage.getItem('math_queue')||'null'),settings:JSON.parse(localStorage.getItem('math_settings')||'{}')})}); } catch(e) {}
        }
        localStorage.removeItem(GONTU_TOKEN_KEY);
        localStorage.removeItem(GONTU_USER_KEY);
        // 清除所有牌组数据，防止切换账号后看到旧数据
        ['idiom_data','idiom_queue','idiom_settings','math_data','math_queue','math_settings','global_study_records','global_streak_data'].forEach(k => localStorage.removeItem(k));
        Object.keys(localStorage).forEach(k => { if (k.startsWith('current_vocab_source_')) localStorage.removeItem(k); });
        updateNavAuth();
        var app = document.getElementById('app');
        if (app && app.classList.contains('active')) { app.classList.remove('active'); document.body.style.overflow = ''; }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #151d28;
            --ink-deep: #111922;
            --ink-mid: #1d2a3a;
            --gold: #c9a96e;
            --gold-light: #e8d5a3;
            --gold-dim: #7a6540;
            --jade: #4a9b7f;
            --vermillion: #c44b3a;
            --parchment: #f5f0e8;
            --parchment-warm: #faf7f2;
            --text-on-dark: rgba(248,245,236,0.95);
            --text-sub-dark: rgba(220,195,140,0.85);
            --text-muted-dark: rgba(248,245,236,0.52);
            --card-bg: #ffffff;
            --glass-border: rgba(0,0,0,0.06);
            --text-main: #1a1a2e;
            --text-sub: #4a4a6a;
            --text-muted: #8891a5;
            --accent-1: #8694CD;
            --accent-2: #D6ABD8;
            --accent-3: #BCDDF3;
            --primary-gradient: linear-gradient(135deg, #8694CD 0%, #D6ABD8 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
            cursor: default;
        }

        /* --- Custom ink brush cursor on hero --- */
        .hero-section, .hero-section * {
            cursor: crosshair;
        }
        .hero-section button, .hero-section a, .hero-section .scroll-indicator {
            cursor: pointer;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ========== 导航栏 ========== */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 56px;
            background: transparent;
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .navbar.scrolled {
            background: rgba(17, 25, 34, 0.92);
            -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
            padding: 14px 56px;
            border-bottom: 1px solid rgba(201,169,110,0.12);
        }

        /* LOGO */
        .logo {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; cursor: pointer;
        }
        .logo-seal {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #c9a96e, #e8d5a3);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem; font-weight: 900;
            color: var(--ink-deep);
            box-shadow: 0 0 0 1px rgba(201,169,110,0.4), 0 4px 20px rgba(201,169,110,0.25);
            letter-spacing: -1px;
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
        }
        .logo:hover .logo-seal { transform: rotate(0deg); }
        .logo-text {
            display: flex; flex-direction: column;
        }
        .logo-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.25rem; font-weight: 700;
            color: var(--parchment);
            letter-spacing: 3px;
            line-height: 1;
        }
        .logo-sub {
            font-size: 0.68rem; font-weight: 400;
            color: var(--text-sub-dark);
            letter-spacing: 2px;
            margin-top: 3px;
        }

        .nav-links { display: flex; gap: 40px; align-items: center; }
        .nav-link {
            color: rgba(245,240,232,0.65);
            text-decoration: none; font-size: 0.88rem; font-weight: 400;
            transition: color 0.3s; cursor: pointer;
            letter-spacing: 1px;
        }
        .nav-link:hover { color: var(--gold-light); }

        .btn-nav {
            background: transparent;
            border: 1px solid rgba(201,169,110,0.5);
            padding: 10px 28px; border-radius: 3px;
            color: var(--gold-light); cursor: pointer;
            font-weight: 500; font-size: 0.88rem;
            transition: all 0.3s; letter-spacing: 1.5px;
            position: relative; overflow: hidden;
        }
        .btn-nav::before {
            content: ''; position: absolute;
            inset: 0; background: var(--gold);
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .btn-nav:hover::before { transform: translateX(0); }
        .btn-nav span { position: relative; z-index: 1; }
        .btn-nav:hover { color: var(--ink-deep); border-color: var(--gold); }

        /* ========== HERO ========== */
        .hero-section {
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            background: var(--ink-deep);
        }

        /* Ink background gradients */
        .hero-bg-layer {
            position: absolute; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 15% 50%, rgba(201,169,110,0.09) 0%, transparent 60%),
                radial-gradient(ellipse 50% 80% at 85% 20%, rgba(74,155,127,0.06) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 50% 100%, rgba(196,75,58,0.04) 0%, transparent 50%),
                radial-gradient(ellipse 40% 40% at 50% 30%, rgba(232,213,163,0.05) 0%, transparent 60%);
        }

        /* Ink wash texture — lightweight CSS version (no feTurbulence) */
        .hero-ink-wash {
            position: absolute; inset: 0; z-index: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(201,169,110,0.025) 0%, transparent 50%),
                radial-gradient(circle at 75% 65%, rgba(74,155,127,0.02) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(196,75,58,0.015) 0%, transparent 45%);
            opacity: 0.6;
        }

        /* Canvas for particles */
        #heroCanvas {
            position: absolute; inset: 0; z-index: 1;
            pointer-events: none;
        }

        /* Grid lines */
        .hero-grid {
            position: absolute; inset: 0; z-index: 1;
            background-image:
                linear-gradient(rgba(201,169,110,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,169,110,0.04) 1px, transparent 1px);
            background-size: 80px 80px;
        }

        /* Decorative ink brushstroke */
        .hero-ink-stroke {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 55%;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }
        .hero-ink-stroke svg {
            position: absolute;
            right: -5%;
            top: 50%;
            transform: translateY(-50%);
            width: 110%;
            height: 110%;
            opacity: 0;
            animation: inkReveal 2s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
        }
        @keyframes inkReveal {
            0% { opacity: 0; clip-path: inset(0 100% 0 0); }
            100% { opacity: 1; clip-path: inset(0 0% 0 0); }
        }

        /* Vertical divider */
        .hero-divider {
            position: absolute;
            left: 50%;
            top: 15%; bottom: 15%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(201,169,110,0.3) 20%, rgba(201,169,110,0.5) 50%, rgba(201,169,110,0.3) 80%, transparent);
            z-index: 3;
        }

        /* Hero layout */
        .hero-inner {
            position: relative; z-index: 10;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 56px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            min-height: 100vh;
            padding-top: 100px;
        }

        /* Left: text content */
        .hero-left { padding-right: 60px; }

        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            border: 1px solid rgba(201,169,110,0.3);
            padding: 6px 18px; border-radius: 2px;
            font-size: 0.78rem; color: var(--gold);
            margin-bottom: 36px;
            letter-spacing: 2px; font-weight: 400;
            opacity: 0;
            animation: inkRevealText 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
            background: rgba(201,169,110,0.05);
            clip-path: inset(0 100% 0 0);
        }
        .hero-badge::before {
            content: ''; width: 6px; height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .hero-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(3.2rem, 5.5vw, 5.2rem);
            font-weight: 900;
            line-height: 1.1;
            color: var(--parchment);
            margin-bottom: 28px;
            opacity: 0;
            animation: inkRevealText 1.1s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
            letter-spacing: 4px;
            clip-path: inset(0 100% 0 0);
            filter: drop-shadow(0 0 20px rgba(201,169,110,0.15));
        }
        .hero-title .gold-text {
            background: linear-gradient(135deg, #c9a96e 0%, #e8d5a3 50%, #c9a96e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero-title .line-2 {
            display: block;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            font-weight: 400;
            letter-spacing: 6px;
            color: rgba(245,240,232,0.5);
            margin-top: 12px;
        }

        .hero-subtitle {
            font-size: 1rem; font-weight: 300;
            color: rgba(245,240,232,0.55);
            max-width: 480px;
            margin-bottom: 52px;
            line-height: 1.9;
            letter-spacing: 0.5px;
            opacity: 0;
            animation: inkRevealText 1s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;
            clip-path: inset(0 100% 0 0);
        }

        .hero-cta {
            display: flex; gap: 16px; align-items: center;
            opacity: 0;
            animation: fadeInUp 0.9s cubic-bezier(0.16,1,0.3,1) 1.4s forwards;
        }
        .btn-hero-primary {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--gold);
            border: none;
            padding: 16px 40px; border-radius: 3px;
            color: var(--ink-deep); cursor: pointer;
            font-weight: 700; font-size: 0.95rem;
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
            letter-spacing: 2px;
            font-family: 'Noto Serif SC', serif;
            position: relative; overflow: hidden;
        }
        .btn-hero-primary::after {
            content: '';
            position: absolute; inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.3s;
        }
        .btn-hero-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(201,169,110,0.4);
        }
        .btn-hero-primary:hover::after {
            background: rgba(255,255,255,0.1);
        }
        .btn-hero-secondary {
            display: inline-flex; align-items: center; gap: 8px;
            background: transparent;
            border: 1px solid rgba(245,240,232,0.2);
            padding: 16px 32px; border-radius: 3px;
            color: rgba(245,240,232,0.65); cursor: pointer;
            font-weight: 400; font-size: 0.9rem;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        .btn-hero-secondary:hover {
            border-color: rgba(245,240,232,0.45);
            color: var(--parchment);
            background: rgba(245,240,232,0.04);
        }

        /* Stats row */
        .hero-stats {
            display: flex; gap: 0; margin-top: 72px;
            border-top: 1px solid rgba(201,169,110,0.12);
            padding-top: 32px;
            opacity: 0;
            animation: fadeInUp 0.9s cubic-bezier(0.16,1,0.3,1) 1.6s forwards;
        }
        .hero-stat {
            flex: 1; padding-right: 32px;
            border-right: 1px solid rgba(201,169,110,0.1);
        }
        .hero-stat:last-child { border-right: none; padding-right: 0; padding-left: 32px; }
        .hero-stat-num {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.2rem; font-weight: 700;
            color: var(--gold);
            letter-spacing: -1px;
            line-height: 1;
        }
        .hero-stat-label {
            font-size: 0.78rem; font-weight: 300;
            color: rgba(245,240,232,0.4);
            margin-top: 6px; letter-spacing: 1px;
        }

        /* Right: SVG figure */
        .hero-right {
            display: flex; align-items: center; justify-content: center;
            position: relative;
            height: 100vh;
        }

        /* Rising figure container */
        .figure-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; align-items: flex-end; justify-content: center;
        }

        /* Ground glow */
        .figure-ground {
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 300px; height: 120px;
            background: radial-gradient(ellipse at center bottom, rgba(201,169,110,0.25) 0%, transparent 70%);
            z-index: 2;
        }

        /* The main SVG figure — ink-emergence entrance */
        #heroFigureSVG {
            position: absolute;
            bottom: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: min(420px, 80%);
            z-index: 5;
            animation: figureRise 4.5s cubic-bezier(0.16,1,0.3,1) 1.2s forwards,
                       figureBreathe 6s ease-in-out 6s infinite;
            opacity: 0;
            filter: drop-shadow(0 0 40px rgba(201,169,110,0.2));
        }
        @keyframes figureRise {
            0%   { opacity: 0; transform: translateX(-50%) translateY(100px); filter: drop-shadow(0 0 0px rgba(201,169,110,0)) blur(12px); }
            30%  { opacity: 0.3; filter: drop-shadow(0 0 20px rgba(201,169,110,0.1)) blur(8px); }
            60%  { opacity: 0.7; filter: drop-shadow(0 0 35px rgba(201,169,110,0.18)) blur(3px); }
            80%  { opacity: 0.9; filter: drop-shadow(0 0 50px rgba(201,169,110,0.28)) blur(0); }
            90%  { opacity: 1; transform: translateX(-50%) translateY(-5px); filter: drop-shadow(0 0 60px rgba(201,169,110,0.35)) blur(0); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); filter: drop-shadow(0 0 40px rgba(201,169,110,0.25)) blur(0); }
        }
        @keyframes figureBreathe {

        /* ========== Animations ========== */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes inkRevealText {
            0%   { opacity: 0; clip-path: inset(0 100% 0 0); }
            60%  { opacity: 1; }
            100% { opacity: 1; clip-path: inset(0 0% 0 0); }
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseBig { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* ============================================
           INK BRUSH MASTER SYSTEM — 水墨笔触动效
           ============================================ */

        /* --- Global Mouse Ink Trail Canvas --- */
        #inkTrailCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
        }

        /* --- Massive Hero Ink Strokes --- */
        .ink-hero-strokes {
            position: absolute; inset: 0; z-index: 4; pointer-events: none; overflow: hidden;
        }

        /* Large horizontal sweep LEFT → RIGHT */
        .ink-stroke-h-1 {
            position: absolute;
            top: 15%; left: -60%;
            width: 180%; height: auto;
            opacity: 0;
            animation: inkSweepRight 2.2s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
            filter: drop-shadow(0 0 30px rgba(201,169,110,0.15));
        }
        @keyframes inkSweepRight {
            0%   { opacity: 0; transform: translateX(-30%) scaleX(0.3); filter: drop-shadow(0 0 0px rgba(201,169,110,0)) blur(8px); }
            60%  { opacity: 1; filter: drop-shadow(0 0 40px rgba(201,169,110,0.2)) blur(0); }
            100% { opacity: 0.7; transform: translateX(0) scaleX(1); filter: drop-shadow(0 0 25px rgba(201,169,110,0.12)) blur(0); }
        }

        /* Vertical stroke TOP → BOTTOM */
        .ink-stroke-v-1 {
            position: absolute;
            top: -50%; right: 12%;
            width: auto; height: 160%;
            opacity: 0;
            animation: inkSweepDown 2.5s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
            filter: drop-shadow(0 0 25px rgba(201,169,110,0.12));
        }
        @keyframes inkSweepDown {
            0%   { opacity: 0; transform: translateY(-20%) scaleY(0.2); filter: drop-shadow(0 0 0px rgba(201,169,110,0)) blur(10px); }
            70%  { opacity: 1; filter: drop-shadow(0 0 35px rgba(201,169,110,0.18)) blur(0); }
            100% { opacity: 0.55; transform: translateY(0) scaleY(1); filter: drop-shadow(0 0 20px rgba(201,169,110,0.1)) blur(0); }
        }

        /* Diagonal stroke LEFT-BOTTOM → RIGHT-TOP */
        .ink-stroke-d-1 {
            position: absolute;
            bottom: -20%; left: -10%;
            width: 140%; height: auto;
            opacity: 0;
            animation: inkSweepDiagonal 2.8s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
            filter: drop-shadow(0 0 20px rgba(201,169,110,0.1));
        }
        @keyframes inkSweepDiagonal {
            0%   { opacity: 0; transform: translate(-15%, 10%) scale(0.4); filter: drop-shadow(0 0 0px rgba(201,169,110,0)) blur(12px); }
            100% { opacity: 0.45; transform: translate(0, 0) scale(1); filter: drop-shadow(0 0 18px rgba(201,169,110,0.08)) blur(0); }
        }

        /* Small accent stroke RIGHT → LEFT */
        .ink-stroke-h-2 {
            position: absolute;
            top: 55%; right: -50%;
            width: 130%; height: auto;
            opacity: 0;
            animation: inkSweepLeft 2s cubic-bezier(0.16,1,0.3,1) 1s forwards;
            filter: drop-shadow(0 0 22px rgba(201,169,110,0.1));
        }
        @keyframes inkSweepLeft {
            0%   { opacity: 0; transform: translateX(25%) scaleX(0.3); filter: drop-shadow(0 0 0px rgba(201,169,110,0)) blur(8px); }
            100% { opacity: 0.5; transform: translateX(0) scaleX(1); filter: drop-shadow(0 0 20px rgba(201,169,110,0.08)) blur(0); }
        }

        /* Ink drip effect */
        .ink-drip {
            position: absolute; z-index: 5; pointer-events: none;
            opacity: 0;
            animation: inkDrip 4s ease-in-out infinite;
        }
        @keyframes inkDrip {
            0%   { opacity: 0; transform: translateY(-30px) scaleY(0.3); }
            15%  { opacity: 0.6; }
            85%  { opacity: 0.6; transform: translateY(0) scaleY(1); }
            100% { opacity: 0; transform: translateY(10px) scaleY(1.2); }
        }

        /* ============================================
           HERO INTERACTIVE INK CANVAS
           ============================================ */
        #heroInkCanvas {
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
        }

        /* ============================================
           CHARACTER STROKE WRITING EFFECT
           ============================================ */
        .stroke-write {
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
        }
        @keyframes strokeWrite {
            to { stroke-dashoffset: 0; }
        }
        @keyframes strokeWriteGlow {
            0%   { filter: drop-shadow(0 0 0px rgba(201,169,110,0)); }
            50%  { filter: drop-shadow(0 0 30px rgba(201,169,110,0.35)); }
            100% { filter: drop-shadow(0 0 15px rgba(201,169,110,0.2)); }
        }

        /* ============================================
           INK SPREAD REVEAL — 墨韵展开
           ============================================ */
        @keyframes inkSpreadReveal {
            0%   { clip-path: circle(0% at 50% 50%); opacity: 0; }
            40%  { clip-path: circle(40% at 50% 50%); opacity: 0.7; }
            100% { clip-path: circle(100% at 50% 50%); opacity: 1; }
        }

        /* ============================================
           SECTION INK DIVIDER
           ============================================ */
        .ink-section-divider {
            position: absolute; left: 0; right: 0; height: 80px;
            pointer-events: none; z-index: 0;
            opacity: 0.35;
        }
        .ink-section-divider.top { top: -1px; }
        .ink-section-divider.bottom { bottom: -1px; }

        /* ============================================
           INK BRUSH DECORATIONS FOR SECTIONS
           ============================================ */

        /* --- Showcase ink strokes --- */
        .showcase-deco {
            position: absolute; inset: 0; pointer-events: none; overflow: hidden;
        }
        .showcase-ink-left {
            position: absolute; left: -2%; top: 10%; width: clamp(120px, 18vw, 300px);
            opacity: 0;
            animation: inkBloomIn 2.5s cubic-bezier(0.16,1,0.3,1) 0.6s forwards,
                       inkBreathe 6s ease-in-out 3.5s infinite;
        }
        .showcase-ink-right {
            position: absolute; right: -2%; bottom: 15%; width: clamp(100px, 15vw, 260px);
            opacity: 0;
            animation: inkBloomIn 2.8s cubic-bezier(0.16,1,0.3,1) 1s forwards,
                       inkBreathe 7s ease-in-out 4s infinite;
        }
        .showcase-ink-corner {
            position: absolute; right: 5%; top: 8%; width: clamp(60px, 8vw, 140px);
            opacity: 0;
            animation: inkBloomIn 2s cubic-bezier(0.16,1,0.3,1) 1.5s forwards,
                       inkBreathe 5s ease-in-out 3.8s infinite;
        }

        @keyframes inkBloomIn {
            0%   { opacity: 0; transform: scale(0.3); filter: drop-shadow(0 0 0px rgba(201,169,110,0)) blur(6px); }
            60%  { opacity: 1; filter: drop-shadow(0 0 30px rgba(201,169,110,0.2)) blur(0); }
            100% { opacity: 0.72; transform: scale(1); filter: drop-shadow(0 0 20px rgba(201,169,110,0.12)) blur(0); }
        }
        @keyframes inkBreathe {
            0%,100% { filter: drop-shadow(0 0 20px rgba(201,169,110,0.12)); transform: scale(1); }
            50%     { filter: drop-shadow(0 0 40px rgba(201,169,110,0.25)); transform: scale(1.03); }
        }

        /* --- Stats section ink accents --- */
        .stats-ink-left {
            position: absolute; left: 2%; top: 50%; transform: translateY(-50%);
            width: clamp(60px, 8vw, 130px);
            opacity: 0;
            animation: inkBloomIn 2s cubic-bezier(0.16,1,0.3,1) 0.4s forwards,
                       inkBreathe 7s ease-in-out 2.8s infinite;
        }
        .stats-ink-right {
            position: absolute; right: 2%; top: 50%; transform: translateY(-50%) scaleX(-1);
            width: clamp(55px, 7vw, 120px);
            opacity: 0;
            animation: inkBloomIn 2s cubic-bezier(0.16,1,0.3,1) 0.8s forwards,
                       inkBreathe 8s ease-in-out 3.2s infinite;
        }

        /* --- CTA ink strokes --- */
        .cta-deco {
            position: absolute; inset: 0; pointer-events: none; overflow: hidden;
        }
        .cta-ink-l {
            position: absolute; left: 3%; top: 55%; transform: translateY(-50%);
            width: clamp(80px, 10vw, 180px);
            opacity: 0;
            animation: inkBloomIn 2.5s cubic-bezier(0.16,1,0.3,1) 0.5s forwards,
                       inkBreathe 7s ease-in-out 3s infinite;
        }
        .cta-ink-r {
            position: absolute; right: 3%; top: 45%; transform: translateY(-50%) scaleX(-1);
            width: clamp(70px, 9vw, 160px);
            opacity: 0;
            animation: inkBloomIn 2.8s cubic-bezier(0.16,1,0.3,1) 0.9s forwards,
                       inkBreathe 8s ease-in-out 3.5s infinite;
        }
        .cta-ink-top {
            position: absolute; right: 10%; top: 5%; width: clamp(50px, 6vw, 100px);
            opacity: 0;
            animation: inkBloomIn 2s cubic-bezier(0.16,1,0.3,1) 1.4s forwards,
                       inkBreathe 6s ease-in-out 4s infinite;
        }

        /* CTA rotating ink ring */
        .cta-ring-1 {
            position: absolute; top: 50%; left: 50%;
            width: 560px; height: 560px;
            margin-left: -280px; margin-top: -280px;
            border-radius: 50%;
            border: 1px dashed rgba(201,169,110,0.1);
            animation: inkRingRotate 40s linear infinite;
        }
        .cta-ring-2 {
            position: absolute; top: 50%; left: 50%;
            width: 360px; height: 360px;
            margin-left: -180px; margin-top: -180px;
            border-radius: 50%;
            border: 1px solid rgba(201,169,110,0.07);
            animation: inkRingRotateCCW 26s linear infinite;
        }
        @keyframes inkRingRotate {
            from { transform: translate(-50%,-50%) rotate(0deg); }
            to   { transform: translate(-50%,-50%) rotate(360deg); }
        }
        @keyframes inkRingRotateCCW {
            from { transform: translate(-50%,-50%) rotate(0deg); }
            to   { transform: translate(-50%,-50%) rotate(-360deg); }
        }

        /* CTA floating chars */
        .cta-chars {
            position: absolute; inset: 0; pointer-events: none;
        }
        .cta-char {
            position: absolute;
            font-family: 'Noto Serif SC', serif;
            color: rgba(201,169,110,0.1);
            font-weight: 700; -webkit-user-select: none; user-select: none;
            animation: floatChar linear infinite;
        }

        /* Features section glow */
        .features-deco {
            position: absolute; inset: 0; pointer-events: none; overflow: hidden;
        }
        .features-glow {
            position: absolute; top: 50%; right: -10%;
            width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 65%);
            transform: translateY(-50%);
            animation: spotlightPulse 10s ease-in-out infinite;
        }

        @keyframes spotlightPulse {
            0%,100% { opacity: 0.18; transform: scale(1) translateY(0); }
            50%     { opacity: 0.38; transform: scale(1.05) translateY(-12px); }
        }

        /* Feature card ink border reveal */
        .feature-card {
            position: relative;
        }
        .feature-card::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,169,110,0.2), transparent);
            transform: scaleX(0); transition: transform 0.8s cubic-bezier(0.16,1,0.3,1);
        }
        .feature-card.visible::after { transform: scaleX(1); }

        /* ========== Responsive ========== */
        @media (max-width: 1024px) {
            .hero-inner { grid-template-columns: 1fr; text-align: center; }
            .hero-left { padding-right: 0; }
            .hero-right { display: none; }
            .hero-cta { justify-content: center; }
            .hero-stats { justify-content: center; }
            .hero-subtitle { margin: 0 auto 52px; }
            .showcase-container { grid-template-columns: 1fr; gap: 60px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .navbar { padding: 16px 24px; }
            .navbar.scrolled { padding: 12px 24px; }
            .nav-links { display: none; }
            .app-grid { grid-template-columns: 1fr; }
            .app-navbar { padding: 12px 20px; }
            .deck-tabs { order: 3; width: 100%; justify-content: center; }
        }
        @media (max-width: 768px) {
            .hero-title { letter-spacing: 2px; }
            .feature-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .cta-title { letter-spacing: 2px; }
            .idiom-word { font-size: 2.5rem; }
            .stats-dashboard { grid-template-columns: repeat(3, 1fr); }
            .summary-stats { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
            .summary-stat .val { font-size: 1.4rem; }
            .stat-item { border-right: none; border-bottom: 1px solid rgba(201,169,110,0.12); }
        }

        /* ===== BTN Primary for CTA ===== */
        .btn-primary {
            background: linear-gradient(135deg, #8694CD 0%, #D6ABD8 100%);
            border: none; padding: 12px 28px; border-radius: 50px;
            color: white; cursor: pointer; font-weight: 600; font-size: 0.9rem;
            transition: all 0.3s; box-shadow: 0 4px 20px rgba(134,148,205,0.35);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(134,148,205,0.45); }
        .btn-large { padding: 16px 40px; font-size: 1rem; }

        /* ═══════════════════════════════════════════════════════════
           宣纸暖白·金墨·文人书斋 —— 学习界面艺术覆写
           移植自 飞扬申论 设计系统，仅作用于 app-section 内部
           ═══════════════════════════════════════════════════════════ */

        /* —— 宣纸纹理 + 金色光晕背景 —— */
        .app-section {
            --paper-bg: #f5f0e6;
            --card-white: #fefdf9;
            --gold: #b08a3a;
            --gold-light: #c9a74d;
            --gold-dark: #8b6826;
            --gold-dim: #6a4e1e;
            --gold-bg: rgba(176,138,58,0.06);
            --gold-bg-hover: rgba(176,138,58,0.12);
            --border: #dfd7c6;
            --border-light: #ebe3d2;
            --ink-deep: #1e1b14;
            --ink-body: #2c2618;
            --ink-mid: #4a4030;
            --ink-light: #7a6e58;
            --ink-faint: #b0a692;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 8px;
            --radius-lg: 12px;
            --trans: 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        .app-section {
            background:
                linear-gradient(135deg, #f7f3e8 0%, #f2ecdd 30%, #faf6ed 60%, #f0e8d5 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E") !important;
            background-blend-mode: normal, multiply !important;
        }
        .app-section::before {
            content: '' !important;
            position: fixed !important;
            inset: 0 !important;
            background:
                radial-gradient(ellipse 700px 500px at 15% 15%, rgba(176,138,58,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 500px 600px at 85% 80%, rgba(176,138,58,0.03) 0%, transparent 70%),
                radial-gradient(ellipse 400px 400px at 50% 40%, rgba(200,180,140,0.03) 0%, transparent 65%) !important;
            pointer-events: none !important;
            z-index: 0 !important;
        }

        /* —— 漂浮金墨粒子动画 —— */
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
            15% { opacity: 0.7; }
            75% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(80px) scale(1.3); opacity: 0; }
        }
        @keyframes goldShimmer {
            0%,100% { opacity: 0.35; }
            50% { opacity: 0.75; }
        }
        @keyframes btnPulse {
            0%,100% { box-shadow: 0 2px 6px rgba(176,138,58,0.2); }
            50% { box-shadow: 0 2px 18px rgba(176,138,58,0.45), 0 0 0 4px rgba(176,138,58,0.06); }
        }
        @keyframes elasticPop {
            0% { transform: scale(0.96); }
            100% { transform: scale(1); }
        }
        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* —— 顶栏：深墨宣纸 + 金墨缀饰 —— */
        .app-navbar {
            background:
                url("data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'200'%20height%3D'60'%3E%3Cfilter%20id%3D'n'%3E%3CfeTurbulence%20type%3D'fractalNoise'%20baseFrequency%3D'0.55'%20numOctaves%3D'4'%20stitchTiles%3D'stitch'%2F%3E%3CfeColorMatrix%20type%3D'saturate'%20values%3D'0'%2F%3E%3C%2Ffilter%3E%3Crect%20width%3D'200'%20height%3D'60'%20filter%3D'url%28%23n%29'%20opacity%3D'0.12'%2F%3E%3C%2Fsvg%3E"),
                linear-gradient(135deg, #1a1510 0%, #221c14 35%, #1f1a12 70%, #181410 100%) !important;
            background-blend-mode: overlay !important;
            -webkit-backdrop-filter: none !important; backdrop-filter: none !important;
            border-bottom: none !important;
            position: relative !important;
            z-index: 10 !important;
            box-shadow: 0 1px 0 rgba(176,138,58,0.12), 0 4px 20px rgba(0,0,0,0.15) !important;
        }
        .app-navbar::before {
            content: '' !important;
            position: absolute !important;
            top: 6px !important;
            left: 10px !important;
            width: 18px !important;
            height: 18px !important;
            border-left: 1.5px solid rgba(176,138,58,0.22) !important;
            border-top: 1.5px solid rgba(176,138,58,0.22) !important;
            display: block !important;
            pointer-events: none !important;
        }
        .app-navbar::after {
            content: '' !important;
            position: absolute !important;
            bottom: -8px !important;
            left: 0 !important;
            right: 0 !important;
            height: 10px !important;
            background: linear-gradient(180deg, rgba(176,138,58,0.08) 0%, transparent 100%) !important;
            display: block !important;
            pointer-events: none !important;
        }
        .app-navbar .logo-name-app {
            color: #e0d6b8 !important;
            letter-spacing: 1px !important;
        }
        .app-navbar .back-btn {
            background: transparent !important;
            border: 1px solid rgba(176,138,58,0.25) !important;
            color: #e0d6b8 !important;
        }
        .app-navbar .back-btn:hover {
            background: rgba(176,138,58,0.1) !important;
            border-color: var(--gold-light) !important;
        }

        /* —— 牌组选择标签：优雅间距 —— */
        .deck-tabs {
            background-color: #e8e2d4 !important;
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cGF0aCBkPSJNMCAyMCBMMTAgMjAgTDEwIDEwIEwyMCAxMCBMMjAgMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJyZ2JhKDE3NiwxMzgsNTgsMC4xNCkiIHN0cm9rZS13aWR0aD0iMC43Ii8+PHBhdGggZD0iTTQwIDIwIEwzMCAyMCBMMzAgMzAgTDIwIDMwIEwyMCA0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJyZ2JhKDE3NiwxMzgsNTgsMC4xNCkiIHN0cm9rZS13aWR0aD0iMC43Ii8+PHBhdGggZD0iTTIwIDQwIEwyMCAzMCBMMzAgMzAgTDMwIDIwIEw0MCAyMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJyZ2JhKDE3NiwxMzgsNTgsMC4wOSkiIHN0cm9rZS13aWR0aD0iMC41Ii8+PHBhdGggZD0iTTIwIDAgTDIwIDEwIEwxMCAxMCBMMTAgMjAgTDAgMjAiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgxNzYsMTM4LDU4LDAuMDkpIiBzdHJva2Utd2lkdGg9IjAuNSIvPjwvc3ZnPg==") !important;
            background-blend-mode: multiply !important;
            gap: 6px !important;
            padding: 4px !important;
            border-radius: 50px !important;
        }
        .deck-tab {
            color: var(--ink-mid) !important;
            transition: var(--trans) !important;
            position: relative !important;
            overflow: hidden !important;
        }
        .deck-tab::after {
            content: '' !important;
            position: absolute !important;
            inset: 0 !important;
            background: radial-gradient(circle at 50% 50%, rgba(176,138,58,0.06) 0%, transparent 70%) !important;
            opacity: 0 !important;
            transition: opacity 0.4s ease !important;
            pointer-events: none !important;
        }
        .deck-tab:hover::after {
            opacity: 1 !important;
        }
        .deck-tab.active {
            background: var(--card-white) !important;
            color: var(--gold-dark) !important;
            box-shadow: 0 2px 8px rgba(176,138,58,0.1) !important;
            font-weight: 600 !important;
        }
        .deck-tab:hover:not(.active) { color: var(--gold-dark) !important; }
        .deck-tab:active { transform: scale(0.94) !important; transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1) !important; }

        /* —— 图标按钮：暗底金边，融入顶栏 —— */
        .btn-icon {
            background: rgba(176,138,58,0.07) !important;
            border: 1px solid rgba(176,138,58,0.18) !important;
            color: #c9b98a !important;
            width: 34px !important;
            height: 34px !important;
            border-radius: 8px !important;
            transition: var(--trans) !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        .btn-icon:hover {
            background: rgba(176,138,58,0.14) !important;
            border-color: var(--gold) !important;
            color: var(--gold-light) !important;
        }

        /* —— 学习卡片容器 —— */
        .study-card-container {
            background: var(--card-white) !important;
            border: 1px solid var(--border-light) !important;
            border-radius: 16px !important;
            box-shadow: 0 2px 16px rgba(0,0,0,0.05) !important;
            position: relative !important;
            z-index: 1 !important;
        }

        /* —— 模式切换 —— */
        .mode-switch {
            background-color: var(--card-white) !important;
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgdmlld0JveD0iMCAwIDIwIDIwIj48Y2lyY2xlIGN4PSIxMCIgY3k9IjEwIiByPSIwLjYiIGZpbGw9InJnYmEoMTc2LDEzOCw1OCwwLjEyKSIvPjxjaXJjbGUgY3g9IjAiIGN5PSIwIiByPSIwLjYiIGZpbGw9InJnYmEoMTc2LDEzOCw1OCwwLjEyKSIvPjxjaXJjbGUgY3g9IjIwIiBjeT0iMCIgcj0iMC42IiBmaWxsPSJyZ2JhKDE3NiwxMzgsNTgsMC4xMikiLz48Y2lyY2xlIGN4PSIwIiBjeT0iMjAiIHI9IjAuNiIgZmlsbD0icmdiYSgxNzYsMTM4LDU4LDAuMTIpIi8+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMC42IiBmaWxsPSJyZ2JhKDE3NiwxMzgsNTgsMC4xMikiLz48L3N2Zz4=") !important;
            border: 1px solid var(--border) !important;
            border-radius: 50px !important;
            padding: 4px !important;
        }
        .mode-btn {
            color: var(--ink-mid) !important;
            border-radius: 50px !important;
            transition: var(--trans) !important;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark)) !important;
            color: #fffef9 !important;
            box-shadow: 0 2px 8px rgba(176,138,58,0.25) !important;
        }
        .mode-btn:hover:not(.active) { color: var(--gold-dark) !important; background: var(--gold-bg) !important; }
        .mode-btn:active { transform: scale(0.94) !important; transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1) !important; }

        /* —— 主学习卡片 —— */
        .big-card {
            background: url("data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'120'%20height%3D'120'%3E%3Cfilter%20id%3D'nz'%3E%20%20%3CfeTurbulence%20type%3D'fractalNoise'%20baseFrequency%3D'0.35'%20numOctaves%3D'5'%20stitchTiles%3D'stitch'%20result%3D'grain'%2F%3E%20%20%3CfeColorMatrix%20type%3D'saturate'%20values%3D'0'%20in%3D'grain'%20result%3D'grainGray'%2F%3E%20%20%3CfeTurbulence%20type%3D'fractalNoise'%20baseFrequency%3D'0.015'%20numOctaves%3D'3'%20stitchTiles%3D'stitch'%20result%3D'stain'%2F%3E%20%20%3CfeColorMatrix%20type%3D'saturate'%20values%3D'0'%20in%3D'stain'%20result%3D'stainGray'%2F%3E%20%20%3CfeBlend%20mode%3D'multiply'%20in%3D'grainGray'%20in2%3D'stainGray'%20result%3D'combined'%2F%3E%3C%2Ffilter%3E%3Crect%20width%3D'120'%20height%3D'120'%20filter%3D'url%28%23nz%29'%20opacity%3D'0.15'%2F%3E%3C%2Fsvg%3E"), linear-gradient(180deg, #fefdf9 0%, #faf7f0 100%) !important;
            background-blend-mode: multiply !important;
            border: 1px solid var(--border-light) !important;
            border-radius: 16px !important;
            box-shadow: var(--shadow-sm), inset 0 0 80px 20px rgba(139,109,56,0.04) !important;
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1) !important;
            animation: cardSlideUp 0.5s cubic-bezier(0.16,1,0.3,1) both !important;
        }
        .big-card:hover {
            border-color: var(--gold) !important;
            transform: translateY(-3px) !important;
            box-shadow: 0 12px 32px rgba(176,138,58,0.1) !important;
        }
        .big-card:active { transform: scale(0.97) !important; transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1) !important; }
        .big-card::before {
            content: '' !important;
            display: block !important;
            height: 3px !important;
            background: linear-gradient(90deg, var(--gold), var(--gold-light)) !important;
            border-radius: 3px 3px 0 0 !important;
        }

        /* —— 成语大字：古韵书体 + 墨渍渗染 —— */
        .idiom-word {
            font-family: 'ZCOOL XiaoWei', 'Ma Shan Zheng', 'Noto Serif SC', 'KaiTi', 'STKaiti', '楷体', serif !important;
            font-weight: 400 !important;
            font-size: 4.6rem !important;
            color: var(--ink-deep) !important;
            letter-spacing: 10px !important;
            text-shadow:
                0 2px 1px rgba(176,138,58,0.14),
                0 4px 3px rgba(139,109,56,0.09),
                0 8px 6px rgba(100,70,30,0.06),
                0 1px 0 rgba(255,255,255,0.08) !important;
            background: linear-gradient(180deg, #2d1f06 0%, #5c3d14 50%, #3d2808 100%) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            background-clip: text !important;
            filter: drop-shadow(0 1px 3px rgba(176,138,58,0.2)) !important;
        }
        .question-text {
            color: var(--ink-body) !important;
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', 'STKaiti', '楷体', serif !important;
            font-size: 1.2rem !important;
            letter-spacing: 1.5px !important;
        }
        .meaning-text {
            color: var(--ink-body) !important;
            font-family: 'Noto Serif SC', 'KaiTi', 'STKaiti', '楷体', serif !important;
            font-size: 1.05rem !important;
            letter-spacing: 1px !important;
            line-height: 1.9 !important;
        }
        .solution-text {
            color: var(--ink-deep) !important;
            border-top: 1px solid var(--border) !important;
        }
        .answer-badge {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark)) !important;
            color: #fffef9 !important;
            font-weight: 600 !important;
        }
        .flip-hint { color: var(--ink-faint) !important; }

        /* —— 操作按钮 —— */
        .btn-remember {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%) !important;
            color: #fffef9 !important;
            box-shadow: 0 2px 12px rgba(176,138,58,0.25) !important;
            border-radius: 50px !important;
            font-weight: 600 !important;
            transition: all 0.25s !important;
            animation: btnPulse 2.5s ease-in-out infinite !important;
        }
        .btn-remember:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 24px rgba(176,138,58,0.35) !important;
            animation: none !important;
        }
        .btn-remember:active { transform: scale(0.95) !important; }
        .btn-forget {
            background: #faf5ef !important;
            color: #a85435 !important;
            border: 1px solid #e8d5c8 !important;
            border-radius: 50px !important;
            transition: var(--trans) !important;
        }
        .btn-forget:hover { background: #f5ece2 !important; border-color: #d4b89a !important; }
        .btn-forget:active { transform: scale(0.95) !important; }

        /* —— 统计卡片 —— */
        .stat-card {

        /* —— 迷你卡片 —— */
        .mini-card {
            background: url("data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'120'%20height%3D'120'%3E%3Cfilter%20id%3D'nz'%3E%20%20%3CfeTurbulence%20type%3D'fractalNoise'%20baseFrequency%3D'0.35'%20numOctaves%3D'5'%20stitchTiles%3D'stitch'%20result%3D'grain'%2F%3E%20%20%3CfeColorMatrix%20type%3D'saturate'%20values%3D'0'%20in%3D'grain'%20result%3D'grainGray'%2F%3E%20%20%3CfeTurbulence%20type%3D'fractalNoise'%20baseFrequency%3D'0.015'%20numOctaves%3D'3'%20stitchTiles%3D'stitch'%20result%3D'stain'%2F%3E%20%20%3CfeColorMatrix%20type%3D'saturate'%20values%3D'0'%20in%3D'stain'%20result%3D'stainGray'%2F%3E%20%20%3CfeBlend%20mode%3D'multiply'%20in%3D'grainGray'%20in2%3D'stainGray'%20result%3D'combined'%2F%3E%3C%2Ffilter%3E%3Crect%20width%3D'120'%20height%3D'120'%20filter%3D'url%28%23nz%29'%20opacity%3D'0.15'%2F%3E%3C%2Fsvg%3E"), #faf7f0 !important;

            pointer-events: none !important;
            z-index: 0 !important;
            top: 10% !important; left: 5% !important;
            width: 3px !important; height: 3px !important;
            border-radius: 50% !important;
            background: rgba(176,138,58,0.3) !important;
            box-shadow:
                80px 40px 0 rgba(176,138,58,0.2),
                200px 120px 0 rgba(176,138,58,0.15),
                350px 60px 0 rgba(176,138,58,0.1),
                500px 200px 0 rgba(176,138,58,0.15),
                620px 80px 0 rgba(176,138,58,0.12),
                750px 160px 0 rgba(176,138,58,0.1),
                70px 300px 0 rgba(176,138,58,0.12),
                280px 350px 0 rgba(176,138,58,0.1),
                450px 400px 0 rgba(176,138,58,0.08),
                680px 320px 0 rgba(176,138,58,0.12),
                820px 380px 0 rgba(176,138,58,0.08),
                120px 480px 0 rgba(176,138,58,0.1),
                380px 520px 0 rgba(176,138,58,0.08),
                580px 480px 0 rgba(176,138,58,0.06) !important;
            animation: particleDrift 12s ease-in-out infinite !important;
        }
        @keyframes particleDrift {
            0%,100% { opacity: 0.5; transform: translate(0,0); }
            33% { opacity: 0.8; transform: translate(-3px, -5px); }
            66% { opacity: 0.4; transform: translate(2px, -3px); }
        }

/* 响应式：窄屏时右侧面板移到下方 */
        @media (max-width: 1100px) {
            .app-grid {
                grid-template-columns: 1fr !important;
            }
            .right-panel {
                position: static !important;
            }
        }


    /* === 左下角微标 === */
    .xi-logo-seal {
        position: fixed !important;
        bottom: 24px !important;
        left: 24px !important;
        width: 42px !important;
        height: 42px !important;
        cursor: pointer !important;
        transform: rotate(-15deg) !important;
        transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.4s ease !important;
        z-index: 9999 !important;
        opacity: 0.4 !important;
        filter: drop-shadow(0 1px 3px rgba(26,21,16,0.12)) !important;
    }
    .xi-logo-seal:hover {
        transform: rotate(0deg) !important;
        opacity: 0.72 !important;
    }
    .xi-logo-seal svg {
        width: 100% !important;
        height: 100% !important;
        display: block !important;
    }

    /* ========== 登录/注册弹窗 ========== */
    .modal-overlay {
        display: none;
        position: fixed; inset: 0; z-index: 10000;
        background: rgba(17,25,34,0.85);
        -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
        align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
        background: #1a2332;
        border: 1px solid rgba(201,169,110,0.2);
        border-radius: 12px;
        padding: 40px 36px;
        width: 100%; max-width: 420px;
        position: relative;
        box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 40px rgba(201,169,110,0.06);
        animation: modalSlideIn 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes modalSlideIn {
        from { opacity: 0; transform: translateY(20px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-close {
        position: absolute; top: 14px; right: 16px;
        background: transparent; border: none;
        color: rgba(245,240,232,0.4); font-size: 1.4rem;
        cursor: pointer; transition: color 0.3s;
    }
    .modal-close:hover { color: var(--parchment); }
    .modal-title {
        font-family: 'Noto Serif SC', serif;
        font-size: 1.5rem; font-weight: 700;
        color: var(--parchment); text-align: center;
        letter-spacing: 2px; margin-bottom: 28px;
    }
    .modal-field {
        display: flex; flex-direction: column; gap: 6px;
        margin-bottom: 20px;
    }
    .modal-field label {
        font-size: 0.82rem; color: var(--text-sub-dark);
        letter-spacing: 1px;
    }
    .modal-field input {
        background: rgba(13,17,23,0.8);
        border: 1px solid rgba(201,169,110,0.2);
        border-radius: 6px; padding: 12px 16px;
        color: var(--parchment); font-size: 0.95rem;
        transition: border-color 0.3s; outline: none;
        font-family: inherit;
    }
    .modal-field input:focus {
        border-color: rgba(201,169,110,0.5);
    }
    .modal-submit {
        width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
        background: var(--gold); border: none;
        padding: 14px; border-radius: 6px;
        color: var(--ink-deep); cursor: pointer;
        font-weight: 700; font-size: 0.95rem;
        letter-spacing: 2px; font-family: 'Noto Serif SC', serif;
        transition: all 0.3s; margin-top: 8px;
    }
    .modal-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(201,169,110,0.4);
    }
    .modal-switch {
        text-align: center; margin-top: 18px;
        font-size: 0.85rem; color: rgba(245,240,232,0.4);
    }
    .modal-switch a {
        color: var(--gold-light); cursor: pointer; text-decoration: none;
    }
    .modal-switch a:hover { text-decoration: underline; }
    .modal-error {
        color: #c44b3a; font-size: 0.82rem;
        text-align: center; margin-bottom: 12px; display: none;
    }

    /* ── 轻量入场动效（GPU 友好） ── */
    .animate-in {
        opacity: 0;
        transform: translateY(28px);
        will-change: opacity, transform;
    }
    .animate-in.show {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1),
                    transform 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    .animate-in.show:nth-child(2) { transition-delay: 0.1s; }
    .animate-in.show:nth-child(3) { transition-delay: 0.2s; }
    .animate-in.show:nth-child(4) { transition-delay: 0.3s; }
    /* 暗色区域文字加亮覆写 */
    .hero-section .section-desc-inner { color: rgba(248,245,236,0.68); font-weight: 300; }
    .hero-section .hero-stat h3 { color: var(--parchment); }
    .hero-section .hero-stat p { color: rgba(248,245,236,0.55); }
    /* 动效完成后释放 will-change */
    .animate-in.show.done {
        will-change: auto;
    }

        /* ========== Phase 6 · accessible formal shell ========== */
        .skip-link {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 12000;
            padding: 10px 14px;
            border-radius: 8px;
            background: var(--ink-deep);
            color: var(--parchment);
            text-decoration: none;
            transform: translateY(-160%);
            transition: transform 0.2s ease;
        }
        .skip-link:focus { transform: translateY(0); }
        :where(button, a, input, select, textarea, [tabindex]):focus-visible {
            outline: 3px solid var(--gold-light) !important;
            outline-offset: 3px;
        }
        .app-nav-toggle {
            display: none;
            align-items: center;
            gap: 8px;
            min-height: 40px;
            padding: 8px 12px;
            border: 1px solid rgba(176,138,58,0.45);
            border-radius: 8px;
            background: rgba(26,21,16,0.78);
            color: #e0d6b8;
            font: inherit;
            cursor: pointer;
        }
        @media (max-width: 720px) {
            .app-navbar { padding: 10px 14px !important; }
            .app-navbar .nav-right { width: 100%; flex-wrap: wrap; justify-content: flex-end; }
            .app-nav-toggle { display: inline-flex; margin-right: auto; }
            .app-navbar .deck-tabs { display: none; order: 3; width: 100%; justify-content: flex-start; overflow-x: auto; padding: 4px 0 2px; }
            .app-navbar[data-nav-open="true"] .deck-tabs { display: flex; }
            .app-navbar .deck-tab { flex: 0 0 auto; }
        }
        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }

    </style>
</head>

    <div class="app-container">
        <div class="app-grid">
            <div class="study-card-container">
                <div class="card-header">

                        <button class="mode-btn active" data-mode="review"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:-3px"><rect x="2" y="1.5" width="14" height="15" rx="1.5" stroke="rgba(176,138,58,0.7)" stroke-width="1.2"/><path d="M4.5 1.5v15" stroke="rgba(176,138,58,0.35)" stroke-width="0.9"/><line x1="6" y1="5.5" x2="12" y2="5.5" stroke="rgba(176,138,58,0.3)" stroke-width="0.7"/><line x1="6" y1="8.5" x2="12" y2="8.5" stroke="rgba(176,138,58,0.3)" stroke-width="0.7"/><line x1="6" y1="11.5" x2="10" y2="11.5" stroke="rgba(176,138,58,0.25)" stroke-width="0.7"/></svg> 今日任务</button>
                        <button class="mode-btn" data-mode="recite"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:-3px"><path d="M9 1.5l1.8 5.5h5.7l-4.6 3.4 1.8 5.5L9 12.5l-4.7 3.4 1.8-5.5-4.6-3.4h5.7z" stroke="rgba(176,138,58,0.7)" stroke-width="1.1" stroke-linejoin="round"/></svg> 全部词库</button>

                </div>

                <!-- 每日目标编辑弹窗（内嵌） -->
                <div class="daily-goal-editor" id="dailyGoalEditor" style="display:none;">

                    <div class="goal-slider-row">
                        <span>每天学习</span>
                        <input type="range" id="dailyGoalSlider" min="5" max="100" value="20" step="5" oninput="updateGoalPreview()" aria-label="每日学习目标数量" title="每日学习目标数量" />
                        <span><strong id="goalSliderValue">20</strong> 个</span>

// Shared throttle helper — limit high-frequency events to ~60fps
function throttle(fn, delay) {
    let last = 0;
    return function(...args) {
        const now = Date.now();
        if (now - last >= delay) { last = now; fn(...args); }
    };
}

// ========== 页面切换 ==========
function startLearning() {
    if (!gontu_isLoggedIn()) {
        document.getElementById('pleaseLoginModal').classList.add('show');
        return;
    }
    const appSection = document.getElementById('app');
    appSection.classList.add('active');
    document.body.style.overflow = 'hidden';
    window.scrollTo(0, 0);
    // 保留用户上次选择的牌组，不强制重置（防止切换词库后被覆盖）
    ensureDeckInitialized();
    // 从后端同步牌组数据后再渲染（保证数据最新）
    syncDeckFromBackend().then(function() {
        // 如果成语数据为空，自动加载对应词库
        autoLoadHighFreqIfNeeded().then(function() {
            if (typeof window.renderAll === 'function') window.renderAll();
        });
    });
    // 同步标签active状态
    document.querySelectorAll('.deck-tab[data-deck]').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.deck === getCurrentDeckType());
    });
}
function backToLanding() {
    window.location.href = '/';
}

const BUILTIN_MATH_DECK = [{"id":"num_001","title":"基础公式与数列运算","stars":"⭐⭐⭐⭐","difficulty":"★★☆☆☆","example":"年级前七名三科平均分构成公差为 1 的等差数列，第七、八、九名平均分既是等差数列又是等比数列，张龙排第十，比第九名少 1 分。张龙英语成绩 121 分被误登为 112 分，问本该名次？\nA. 第四  B. 第五  C. 第七  D. 第八","solution":"熟记平方差、完全平方、立方和差、幂运算核心公式，快速化简复杂算式；等差、等比数列固定套用通项、求和公式，利用奇偶项、中项性质简化计算；特殊结论：奇数项等差数列，总和 = 项数 × 等差中项 = 项数 × 平均数；既是等差又是等比的非零数列为恒定数列。","answer":"B","variants":"班级成绩分段等差、恒定数列结合求排名、分数修正问题；多科目成绩误差修正，结合数列性质计算真实排名；奇偶项拆分等差数列、混合数列求值最值问题。"},{"id":"num_002","title":"速算技巧（截位/尾数/高位叠加）","stars":"⭐⭐⭐⭐⭐","difficulty":"★☆☆☆☆","example":"估算 278.3 × 4695","solution":"截位直除：一步除法仅截分母，多步乘除分子分母同步截位；选项差距大截2位、差距小截3位，8进2舍其余一进一舍；尾数法：选项末位不同时，仅计算算式结果尾数，快速排错；高位叠加：对齐数位从左至右计算高位，快速估算结果区间。","answer":"约 131 万","variants":"资料分析多步乘除混合估算，适配截位规则快速计算；小数、百分数、整数混合运算，用尾数法秒杀选项；多组数据求和、比大小，用高位叠加快速判定结果。"},{"id":"num_003","title":"倍数与整除特性","stars":"⭐⭐⭐⭐⭐","difficulty":"★★★☆☆","example":"语文教材是其余三种的 1/4，数学是其余三种的 3/7，英语是其余三种的 7/13，科学比数学少 30 本，求数学数量？\nA.30  B.60  C.100  D.200","solution":"题干出现比例、分数、百分数，统一化为最简分数，整体总量为分子分母之和的倍数；固定整除判定：3/9看各位数字和，2/5看末位，4/25看末两位，8/125看末三位；整除推论：若a、b可被c整除，则a±b也可被c整除，用于快速排错。","answer":"B","variants":"多主体占比问题，已知部分差值求单一主体数量；已知占比比例，利用整除特性快速锁定总量范围；多人分配、物资分配比例问题，秒杀排除错误选项。"},{"id":"num_004","title":"余数周期特性","stars":"⭐⭐⭐⭐","difficulty":"★★★☆☆","example":"一个数除 7 余 5，除 6 余 4，除 3 余 1，求被除数通式。","solution":"余同取余：多组除法余数相同，总数=除数最小公倍数+相同余数；和同加和：除数+余数和值相同，总数=除数最小公倍数+相同和值；差同减差：除数-余数差值相同，总数=除数最小公倍数-相同差值。","answer":"42n - 2","variants":"物品分批分配，余数不同求符合条件的最小数量；日期、编号余数周期查询问题；无统一余数规律，枚举法结合整除特性求解。"},{"id":"equ_001","title":"和差倍比基础运算","stars":"⭐⭐⭐⭐⭐","difficulty":"★★☆☆☆","example":"甲单位 60% 职工、乙单位 75% 职工下沉社区，甲派出人数比乙少 3 人；剩余职工中甲抽 40%、乙抽 75%，共 24 人培训。甲比乙？\nA. 少 3 人  B. 少 11 人  C. 多 3 人  D. 多 11 人","solution":"核心找等量关系，设未知数遵循：设小不设大、求谁设谁、设中间量，规避分数运算；解题优先级：奇偶、倍数、尾数特性排除选项，再代入剩余选项验证；通用秒杀技巧：三奇一偶选偶，三偶一奇选奇；最值问法反向选次值。","answer":"D","variants":"多批次人员抽调、比例分配差值问题；两主体数量比例变化，求初始数量差值；结合奇偶倍数特性，无需求解方程直接秒杀。"},{"id":"equ_002","title":"单不定方程求解","stars":"⭐⭐⭐⭐","difficulty":"★★★☆☆","example":"产品每箱 48 个，第 1 天做了若干完整箱另加散件，第 2 天做了前一天的 1.5 倍，两天共 414 个，散件不超过 40 个，求散件数量。","solution":"整数约束：含整除关系时，先列方程，根据整除特性（倍数、余数）枚举可行解；一元不定方程：先定范围，再逐一枚举验证；分组赋值：两组数量相差不大时，先假设相等，再用差值反推。","answer":"散件 18 个","variants":"工件、产品分组生产问题，整数约束求具体数量；资源分配不定方程，列方程后整数枚举；连续两天或多轮生产，累计量与分量约束联立求解。"},{"id":"spec_001","title":"牛吃草问题","stars":"⭐⭐⭐⭐","difficulty":"★★★★☆","example":"一片草地，30头牛 10天吃完，20头牛 20天吃完，问 10头牛需要多少天？","solution":"每天新长草量 = (牛数₁×天数₁ - 牛数₂×天数₂) ÷ (天数₁ - 天数₂) = (30×10-20×20)÷(10-20)=10\n原有草量 = 天数₁×(牛数₁ - 每天新长草量) = 10×(30-10)=200\n所求天数 = 原有草量 ÷ (所求牛数 - 每天新长草量) = 200÷(10-10) = 无限 → 调整：200÷0，实际答案为牛数=10=新长，永远吃不完；若问15头牛=200÷5=40天","answer":"约40天（以15头为例）","variants":"水池注水与漏水问题；多组条件联立求原量和速率；条件给出总量和倍数关系，用倍数法替代方程。"},{"id":"work_001","title":"工程效率问题","stars":"⭐⭐⭐⭐⭐","difficulty":"★★☆☆☆","example":"甲单独做需10天，乙单独做需15天，两人合作几天完成？","solution":"设总量=1，甲效率=1/10，乙效率=1/15\n合作效率=1/10+1/15=1/6\n合作天数=1÷(1/6)=6天","answer":"6天","variants":"甲乙丙三人合作，已知两两合作时间；中途换人，分段计算工程量；效率之比求时间之比。"},{"id":"conc_001","title":"溶液浓度混合","stars":"⭐⭐⭐⭐","difficulty":"★★★☆☆","example":"30%盐水200g与80%盐水混合，得到50%盐水，需80%盐水多少克？","solution":"十字交叉法：\n  30%  \\   / 30\n       50%\n  80%  /   \\ 20\n质量比 = 30:20 = 3:2\n200×(2/3) = 133.3g","answer":"133克","variants":"蒸发浓缩问题（去水）；稀释问题（加水/加溶剂）；三种溶液混合求最终浓度。"},{"id":"olym_001","title":"鸡兔同笼","stars":"⭐⭐⭐⭐⭐","difficulty":"★☆☆☆☆","example":"鸡兔共35只，腿共94条，各几只？","solution":"假设全是鸡：腿=35×2=70，实际多94-70=24条\n每换一只兔多2条腿\n兔=24÷2=12只，鸡=35-12=23只","answer":"鸡23只，兔12只","variants":"多种动物混合（鸡鸭鹅）；船票/车票不同座位；收益计算中的盈亏分配。"},{"id":"olym_002","title":"盈亏分配","stars":"⭐⭐⭐⭐","difficulty":"★★☆☆☆","example":"物品分给若干人，每人3个多5个，每人4个少3个，求人数和物品数。","solution":"人数=(盈+亏)÷(每人多分-每人少分)=(5+3)÷(4-3)=8人\n物品数=8×3+5=29个","answer":"8人，29个物品","variants":"教室分配座位；资源平均分配有余有缺；多轮分配盈亏叠加。"},{"id":"maxmin_001","title":"最不利构造","stars":"⭐⭐⭐⭐","difficulty":"★★★☆☆","example":"袋中红球5个蓝球4个，至少摸几个才能保证有3个同色球？","solution":"最坏情况：红2蓝2=4个，此时再取1个必然凑成3个同色\n答案=4+1=5个","answer":"5个","variants":"至少选几张牌保证有同花；至少选几人保证同月生日；多种颜色保证k个同色。"},{"id":"rate_001","title":"利润折扣问题","stars":"⭐⭐⭐⭐⭐","difficulty":"★★☆☆☆","example":"商品进价100元，标价为进价的150%，打8折后售出，利润率为多少？","solution":"标价=100×150%=150元\n售价=150×80%=120元\n利润=120-100=20元\n利润率=20÷100=20%","answer":"20%","variants":"先涨价再打折的综合利润；已知利润率求进价或售价；多件不同定价商品的综合利润率。"},{"id":"route_001","title":"行程追及相遇","stars":"⭐⭐⭐⭐⭐","difficulty":"★★★☆☆","example":"甲乙相距240km相向而行，甲速60km/h，乙速40km/h，几小时相遇？","solution":"相遇时间=总距离÷速度和=240÷(60+40)=2.4小时","answer":"2.4小时","variants":"环形跑道追及问题；火车过桥/隧道；顺流逆流行船速度。"},{"id":"perm_001","title":"排列组合与概率","stars":"⭐⭐⭐⭐","difficulty":"★★★★☆","example":"5人中选3人排成一排，有多少种排法？","solution":"A(5,3)=5×4×3=60种\n（有序选取用排列，无序选取用组合C）","answer":"60种","variants":"圆形排列（÷n）；男女交替排列；至少/至多包含某人的概率。"}];

function ensureDeckInitialized() {

function hydrateBuiltinMathDeck(source) {
    let data = Array.isArray(source) ? source.slice() : [];
    let byId = new Map(data.map(card => [card.id, card]));
    BUILTIN_MATH_DECK.forEach(card => {
        let saved = byId.get(card.id);
        if (!saved) {
            saved = { id: card.id, type: 'math', title: card.title, stars: card.stars, difficulty: card.difficulty, question: card.example, solution: card.solution, answer: card.answer, variants: card.variants, mastered: false, studyCount: 0, forgetCount: 0, lastStudyTime: '', nextReviewTime: today(), intervalIdx: 0 };
            data.push(saved);
            byId.set(card.id, saved);
        }
        if (MATH_BLANK_STEPS[card.id] && (!saved.blank_steps || !Array.isArray(saved.blank_steps.steps) || saved.blank_steps.steps.length === 0)) {
            saved.blank_steps = MATH_BLANK_STEPS[card.id];
        }
    });
    return data;
}
function importBuiltinMathDeck() {
    // 这里只补全当前浏览器缓存，不在“先拉后端”之前反向覆盖账号数据。
    // 用户实际作答时仍会走 saveIdioms()，把完整卡组和学习状态正常同步。
    localStorage.setItem(deckKey('data'), JSON.stringify(hydrateBuiltinMathDeck(loadIdiomsRaw())));
}

async function syncDeckFromBackend() {
    if (!gontu_isLoggedIn()) return;
    const token = localStorage.getItem(GONTU_TOKEN_KEY);
    for (const type of ['idiom','math']) {
        try {
            const resp = await fetch(API_BASE+'/api/deck/'+type,{headers:{'Authorization':'Bearer '+token}});
            if (!resp.ok) continue;
            const data = await resp.json();
            const cfg = DECK_CONFIGS[type];
            if (data.cards && data.cards.length > 0) {
                const cards = type === 'math' ? hydrateBuiltinMathDeck(data.cards) : data.cards;
                localStorage.setItem(cfg.storagePrefix+'data', JSON.stringify(cards));
            }
            if (data.queue) localStorage.setItem(cfg.storagePrefix+'queue', JSON.stringify(data.queue));
            if (data.settings) localStorage.setItem(cfg.storagePrefix+'settings', JSON.stringify(data.settings));
        } catch(e) { console.warn('[Sync] Pull '+type+' failed:',e.message); }
    }
}
