function generateUUID() {
    if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        return crypto.randomUUID();
    }
    // Fallback for non-HTTPS / older browsers
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
}

function getOrCreateUserId() {
    let uid = localStorage.getItem('__gontu_uid');
    if (!uid) { uid = generateUUID(); localStorage.setItem('__gontu_uid', uid); }
    return uid;
}

async function syncToBackend(cardId, action) {
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 3000); // 3秒超时
        const resp = await apiFetch(API_BASE + '/api/sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                events: [{ card_id: cardId, action, created_at: new Date().toISOString() }]
            }),
            signal: controller.signal
        });
        clearTimeout(timeout);
        if (!resp.ok) console.warn('[Sync] 后端返回异常:', resp.status);
    } catch(e) {
        // Phase 1: 静默忽略，localStorage 已保存，用户不受影响
        console.warn('[Sync] 同步失败，本地数据已安全保存:', e.message);
    }
}
function loadIdioms() { return loadIdiomsRaw(); }
function updateIdiom(id, updates) { let data = loadIdioms(); let idx = data.findIndex(d => d.id === id); if (idx !== -1) { Object.assign(data[idx], updates); saveIdioms(data); return data[idx]; } return null; }
function escapeHtml(str) {
    return String(str || '').replace(/[&<>"']/g, function(ch) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]);
    });
}
function getDefaultCardState() {
    return { mastered: false, studyCount: 0, forgetCount: 0, lastStudyTime: '', nextReviewTime: today(), intervalIdx: 0, favorite: false };
}
function buildIdiomCard(entry, previousState) {
    var name = (entry.name || entry.idiom || entry.word || '').trim();
    var state = Object.assign(getDefaultCardState(), previousState || {});
    return Object.assign({}, state, {
        id: name,
        type: 'idiom',
        meaning: entry.meaning || '暂无释义',
        examples: entry.examples || '',
        source: entry.source || '',
        search_url: entry.search_url || entry.searchUrl || ('https://search.people.cn/s?keyword=' + encodeURIComponent(name))
    });
}
function getDeckDataForType(deckType) {
    var prefix = (DECK_CONFIGS[deckType] || DECK_CONFIGS.idiom).storagePrefix;
    try { return JSON.parse(localStorage.getItem(prefix + 'data')) || []; } catch(e) { return []; }
}
function saveDeckDataForType(deckType, data) {
    if (deckType === getCurrentDeckType()) {
        saveIdioms(data);
        return;
    }
    if (deckType === 'idiom') {
        saveIdiomDeckData(data);
        return;
    }
    var prefix = (DECK_CONFIGS[deckType] || DECK_CONFIGS.idiom).storagePrefix;
    localStorage.setItem(prefix + 'data', JSON.stringify(data));
    pushDeckToBackend(deckType);
}
function replaceIdiomsFromSource(list, deckType) {
    var targetDeck = deckType || getCurrentDeckType();
    var oldData = getDeckDataForType(targetDeck);
    var stateById = {};
    oldData.forEach(function(item) {
        stateById[item.id] = {
            mastered: !!item.mastered,
            studyCount: item.studyCount || 0,
            forgetCount: item.forgetCount || 0,
            lastStudyTime: item.lastStudyTime || '',
            nextReviewTime: item.nextReviewTime || today(),
            intervalIdx: item.intervalIdx || 0,
            favorite: !!item.favorite
        };
    });
    var seen = {};
    var newData = [];
    list.forEach(function(entry) {
        var name = (entry.name || entry.idiom || entry.word || '').trim();
        if (!name || seen[name]) return;
        seen[name] = true;
        newData.push(buildIdiomCard(entry, stateById[name]));
    });
    saveDeckDataForType(targetDeck, newData);
    if (targetDeck === getCurrentDeckType()) pruneTodayQueueToExistingWords(newData);
    return newData.length;
}
async function applyVocabStateFromBackend() {
    if (!gontu_isLoggedIn() || getCurrentDeckType() !== 'idiom') return;
    try {
        var resp = await apiFetch(API_BASE + '/api/verbal-catalog/vocab/state');
        if (!resp.ok) return;
        var states = await resp.json();
        if (!states || states.length === 0) return;
        var byWord = {};
        states.forEach(function(s) { byWord[s.word] = s; });
        var data = loadIdioms();
        var changed = false;
        data.forEach(function(item) {
            var s = byWord[item.id];
            if (!s) return;
            item.studyCount = s.study_count || 0;
            item.forgetCount = s.forget_count || 0;
            item.intervalIdx = s.interval_idx || 0;
            item.mastered = !!s.mastered;
            item.favorite = !!s.favorite;
            item.lastStudyTime = s.last_study_date || '';
            item.nextReviewTime = s.next_review_date || item.nextReviewTime || today();
            changed = true;
        });
        if (changed) saveIdioms(data);
    } catch(e) { console.warn('[VocabState] 拉取失败：', e.message); }
}
function mergeIdioms(list) {
    let data = loadIdioms(); let existing = new Set(data.map(d => d.id)); let added = 0;
    list.forEach(entry => {
        let name = (entry.name || entry.idiom || entry.word || '').trim();
        if (!name) return;
        if (existing.has(name)) {
            var idx = data.findIndex(d => d.id === name);
            if (idx !== -1) {
                data[idx].meaning = entry.meaning || data[idx].meaning || '暂无释义';
                data[idx].examples = entry.examples || data[idx].examples || '';
                data[idx].search_url = entry.search_url || entry.searchUrl || data[idx].search_url || ('https://search.people.cn/s?keyword=' + encodeURIComponent(name));
            }
            return;
        }
        data.push(buildIdiomCard(entry));
        existing.add(name); added++;
    });
    saveIdioms(data); return added;
}
function loadGlobalRecords() { try { return JSON.parse(localStorage.getItem(GLOBAL_RECORDS_KEY)) || {}; } catch(e) { return {}; } }
function recordStudy() {
    let rec = loadGlobalRecords();
    let t = today();
    rec[t] = (rec[t] || 0) + 1;
    localStorage.setItem(GLOBAL_RECORDS_KEY, JSON.stringify(rec));
    updateStreak();

    pushUserMetaToBackend();

    incrementTodayStudied();
}
function getTodayStudiedCount() {
    var key = 'today_studied_' + today();
    return parseInt(localStorage.getItem(key)) || 0;
}
function incrementTodayStudied() {
    var key = 'today_studied_' + today();
    var count = parseInt(localStorage.getItem(key)) || 0;
    localStorage.setItem(key, count + 1);
}
function loadStreakData() { try { return JSON.parse(localStorage.getItem(GLOBAL_STREAK_KEY)) || { streak: 0, lastStudyDate: '' }; } catch(e) { return { streak: 0, lastStudyDate: '' }; } }
function updateStreak() {
    let sd = loadStreakData(); let t = today(); let yesterday = addDays(t, -1);
    if (sd.lastStudyDate === t) return;
    if (sd.lastStudyDate === yesterday) { sd.streak += 1; } else if (sd.lastStudyDate !== t) { sd.streak = 1; }
    sd.lastStudyDate = t;
    localStorage.setItem(GLOBAL_STREAK_KEY, JSON.stringify(sd));
}
function getStreak() {
    let sd = loadStreakData();
    if (sd.lastStudyDate !== today()) { let yesterday = addDays(today(), -1); if (sd.lastStudyDate === yesterday) return sd.streak; return 0; }
    return sd.streak;
}
function loadQueue() { try { return JSON.parse(localStorage.getItem(deckKey('queue'))); } catch(e) { return null; } }
function saveQueue(q) { localStorage.setItem(deckKey('queue'), JSON.stringify(q)); pushCurrentDeckToBackend(); }
function loadSettings() {
    try {
        var settings = JSON.parse(localStorage.getItem(deckKey('settings'))) || {};
        if (!Number.isFinite(Number(settings.dailyNewCount)) || Number(settings.dailyNewCount) <= 0) {
            settings.dailyNewCount = 10;
        } else {
            settings.dailyNewCount = Number(settings.dailyNewCount);
        }
        return settings;
    } catch(e) {
        return { dailyNewCount: 10 };
    }
}
function hasPendingLearningItems(data) {
    var t = today();
    return (data || loadIdioms()).some(function(d) {
        if (d.mastered) return false;
        if ((d.studyCount || 0) === 0) return true;
        return (d.nextReviewTime || t) <= t;
    });
}
function shouldRegenerateTodayQueue(q, data) {
    if (!q || q.date !== today() || !Array.isArray(q.items)) return true;
    return q.items.length === 0 && (q.doneToday || 0) === 0 && hasPendingLearningItems(data);
}
function fillTodayQueueToGoal(q, data) {
    if (!q || q.date !== today() || !Array.isArray(q.items)) return q;
    var goal = getDailyGoal();
    var done = getTodayStudiedCount();
    var deficit = Math.max(0, goal - done - q.items.length);
    if (deficit <= 0) return q;
    var t = today();
    var queued = new Set(q.items);
    var candidates = (data || loadIdioms()).filter(function(d) {
        if (!d || !d.id || d.mastered || queued.has(d.id)) return false;
        if ((d.studyCount || 0) === 0) return true;
        return (d.nextReviewTime || t) <= t;
    });
    candidates.slice(0, deficit).forEach(function(d) {
        q.items.push(d.id);
        queued.add(d.id);
    });
    q.total = Math.max(q.total || 0, q.items.length + (q.doneToday || 0));
    return q;
}
function ensureTodayQueueReady(data) {
    var q = loadQueue();
    if (shouldRegenerateTodayQueue(q, data)) q = generateDailyQueue();
    var beforeItems = q && Array.isArray(q.items) ? q.items.length : 0;
    var beforeTotal = q ? (q.total || 0) : 0;
    q = fillTodayQueueToGoal(q, data);
    if (q && (q.items.length !== beforeItems || (q.total || 0) !== beforeTotal)) saveQueue(q);
    return q;
}
function pruneTodayQueueToExistingWords(data) {
    var q = loadQueue();
    if (!q || !Array.isArray(q.items)) return;
    var valid = new Set((data || loadIdioms()).map(d => d.id));
    q.items = q.items.filter(id => valid.has(id));
    q.total = q.items.length + (q.doneToday || 0);
    if (q.date === today() && q.items.length === 0 && (q.doneToday || 0) === 0 && hasPendingLearningItems(data)) {
        generateDailyQueue();
        return;
    }
    saveQueue(q);
}
function generateDailyQueue() {
    let data = loadIdioms(); let t = today();
    let reviewWords = data.filter(d => !d.mastered && d.studyCount > 0 && d.nextReviewTime <= t);
    let newWords = data.filter(d => !d.mastered && d.studyCount === 0);
    let newCount = Math.max(0, Math.min(newWords.length, getDailyGoal() - reviewWords.length));
    let items = [...reviewWords.map(d => d.id), ...newWords.slice(0, newCount).map(d => d.id)];
    let q = { date: t, items, total: items.length, doneToday: 0 };
    saveQueue(q); return q;
}
function getTodayQueue() { return ensureTodayQueueReady(); }

    var explanation = '';
    if (verbalState.answered) {
        explanation = '<div class="quiz-explanation show"><strong>正确答案：' + verbalState.result.correct_answer + '</strong><br><span>本题暂无原书解析</span><br><span>AI讲解：尚未生成，可带本题上下文去问西西。</span></div><button class="quiz-next-btn show" id="verbalNextBtn">下一题 →</button>';
    }
    zone.innerHTML = '<div class="quiz-card"><div class="quiz-header"><span class="quiz-question-label">花生海海刷 · 逻辑填空</span><span class="quiz-progress">' + (verbalState.idx + 1) + ' / ' + verbalState.questions.length + '</span></div><div class="quiz-description">' + escapeHtml(q.stem) + '</div><div class="quiz-options">' + optsHtml + '</div>' + explanation + '<div style="margin-top:14px;font-size:0.85rem;color:#64748b;">题中词语可加入今日学习：' + termsHtml + '</div></div>';
    document.querySelectorAll('.quiz-option').forEach(function(opt) {
        opt.onclick = function() {
            if (verbalState.answered) return;
            submitVerbalAnswer(q.id, this.dataset.answer);
        };
    });
    document.querySelectorAll('.verbal-term-btn').forEach(function(btn) {
        btn.onclick = function() { quickLearn(this.dataset.term); };
        btn.onmouseenter = function() { showVerbalTermTooltip(this.dataset.term, this); };
        btn.onfocus = function() { showVerbalTermTooltip(this.dataset.term, this); };
        btn.onmouseleave = scheduleHideVerbalTermTooltip;
        btn.onblur = scheduleHideVerbalTermTooltip;
    });
    var nextBtn = document.getElementById('verbalNextBtn');
    if (nextBtn) {
        nextBtn.onclick = function() {
            verbalState.idx++;
            verbalState.answered = false;
            verbalState.selected = '';
            verbalState.result = null;
            renderVerbalQuestionCard();
        };
    }
}

async function submitVerbalAnswer(questionId, answer) {
    verbalState.selected = answer;
    try {
        var resp = await apiFetch(API_BASE + '/api/verbal-catalog/logic-fill/attempts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question_id: questionId, selected_answer: answer, elapsed_ms: 0 })
        });
        if (!resp.ok) throw new Error('后端返回 ' + resp.status);
        verbalState.result = await resp.json();
        verbalState.answered = true;
        recordStudy();
    } catch(e) {
        gontuToast('作答保存失败：' + e.message, 'error');
    }
    renderVerbalQuestionCard();
}

function gontuToast(msg, type) {
    type = type || 'info';
    var t = document.getElementById('gontuToast');
    if (!t) { t = document.createElement('div'); t.id = 'gontuToast'; t.className = 'gontu-toast'; document.body.appendChild(t); }
    t.textContent = msg; t.className = 'gontu-toast ' + type + ' show';
    clearTimeout(t._timeout);
    t._timeout = setTimeout(function() { t.className = 'gontu-toast'; }, 2800);
}

function gontuDialog(msg, opts) {
    // opts = { okText, cancelText, confirm, showCancel, input }
    opts = opts || {};
    return new Promise(function(resolve) {
        var overlay = document.getElementById('gontuDialog');
        var body = document.getElementById('gontuDialogBody');
        var btnOk = document.getElementById('gontuDialogOk');
        var btnCancel = document.getElementById('gontuDialogCancel');
        if (!overlay) { resolve(!opts.showCancel); return; }
        var inputHtml = '';
        if (opts.input) {
            inputHtml = '<input class="gontu-dialog-input" id="gontuDialogInput" placeholder="' + (opts.inputPlaceholder || '') + '" value="' + (opts.inputValue || '') + '" />';
        }
        body.innerHTML = '<div style="margin-bottom:6px;">' + msg + '</div>' + inputHtml;
        btnOk.textContent = opts.okText || '确定';
        btnCancel.style.display = opts.showCancel !== false ? '' : 'none';
        overlay.style.display = '';

        var cleanup = function(result) {
            overlay.style.display = 'none';
            btnOk.onclick = btnCancel.onclick = null;
            resolve(result);
        };
        btnOk.onclick = function() {
            if (opts.input) {
                var inpVal = document.getElementById('gontuDialogInput').value;
                cleanup(opts.showCancel ? inpVal : true);
            } else {
                cleanup(true);
            }
        };
        btnCancel.onclick = function() { cleanup(opts.showCancel ? false : true); };
    });
}

function gontuAlert(msg) { return gontuDialog(msg, { showCancel: false }); }
function gontuConfirm(msg) { return gontuDialog(msg, { showCancel: true, okText: '确定', cancelText: '取消' }); }
function gontuPrompt(msg, defaultValue) { return gontuDialog(msg, { showCancel: true, input: true, inputValue: defaultValue || '' }); }

var DAILY_GOAL_KEY = 'daily_goal';

function getDailyGoal() { return parseInt(localStorage.getItem(DAILY_GOAL_KEY)) || 20; }
function setDailyGoal(n) {
    n = Math.max(5, Math.min(100, parseInt(n) || 20));

function calculateEstimatedTime(goal) {
    var dt = getCurrentDeckType();
    // 成语约30秒/个，数量关系约2分钟/题
    var secPerCard = dt === 'math' ? 120 : 30;
    var totalSec = goal * secPerCard;
    var min = Math.round(totalSec / 60);
    if (min < 1) return '不到 1 分钟';
    if (min < 60) return '约 ' + min + ' 分钟';
    var h = Math.floor(min / 60);
    var m = min % 60;
    return '约 ' + h + ' 小时 ' + (m > 0 ? m + ' 分钟' : '');
}

window.quickLearn = function(id) {
    var name = String(id || '').trim();
    if (!name) return;
    if (getCurrentDeckType() === 'verbal') {
        if (addTermToIdiomToday(name)) gontuToast('已加入成语今日任务：' + name, 'success');
        return;
    }
    let data = loadIdioms();
    if (!data.find(d => d.id === name)) {
        ensureTermCard(name);
        data = loadIdioms();
    }
    let q = getTodayQueue(); let items = q.items.filter(i => i !== name); items.unshift(name);
    q.items = items; q.total = items.length + (q.doneToday || 0); saveQueue(q); renderAll();
};

function renderLearningCard() {
    let zone = document.getElementById('learningZone');

        return;
    }
    let q = getTodayQueue();
    let studyItems = currentMode === 'review' ? q.items : (activeModeItems || []);
    let currentId = studyItems.length > 0 ? studyItems[0] : null;
    if (!currentId && studyItems.length === 0) {
        let title = currentMode === 'review' ? '今日学习完成！' : (currentMode === 'recite' ? '全部词库已浏览完' : '暂无易忘词需要攻克');
        let sub = currentMode === 'review' ? '明天再来看复习任务~' : '切回今日任务继续学习。';
        zone.innerHTML = `<div class="completion-card"><i class="fas fa-trophy"></i><h3>${title}</h3><p>${sub}</p></div>`;
        if (currentMode === 'review') showDailySummary();

function formatIdiomMeaning(card) {
    var html = escapeHtml(card.meaning || '暂无释义');
    if (card.examples) {
        html += '<div class="solution-text" style="white-space:pre-line;margin-top:14px;"><div style="font-weight:700;color:var(--gold-dark);margin-bottom:6px;">例句</div>' + escapeHtml(card.examples) + '</div>';
    }
    var url = card.search_url || ('https://search.people.cn/s?keyword=' + encodeURIComponent(card.id));
    html += '<a class="btn-sm" style="display:inline-block;margin-top:14px;text-decoration:none;" target="_blank" rel="noreferrer" href="' + escapeHtml(url) + '"><i class="fas fa-search"></i> 人民网搜索</a>';
    return html;
}

function renderBlankStepsCard(zone, card, q) {
    let bs = card.blank_steps;
    if (!bs || !bs.steps || bs.steps.length === 0) { currentMode = 'review'; renderLearningCard(); return; }
    let typeBadge = `<div class="card-type-badge math">🧮 ${card.title || '数量关系'} ${card.difficulty || ''}</div>`;

    // 为每个空生成4个干扰选项
    function generateChoices(correctAnswer, allAnswers) {
        var correct = String(correctAnswer).trim();
        var isNumeric = /^-?\d+(\.\d+)?$/.test(correct);
        var choices = [correct];
        if (isNumeric) {
            var n = parseFloat(correct);
            var offsets = [1, 2, 3, -1, -2, -3, 0.5, 2, 10, -0.5];
            offsets.forEach(function(o) {
                var v = String(Math.round((n + o) * 100) / 100);
                if (choices.indexOf(v) < 0 && choices.length < 4) choices.push(v);
            });
            // 倍数干扰
            [0.5, 2, 3].forEach(function(m) {
                var v = String(Math.round((n * m) * 100) / 100);
                if (choices.indexOf(v) < 0 && choices.length < 4) choices.push(v);
            });
        } else {
            // 文本干扰：从其他答案取
            allAnswers.forEach(function(a) {
                var s = String(a).trim();
                if (s !== correct && choices.indexOf(s) < 0 && choices.length < 4) choices.push(s);
            });
            if (choices.length < 4) {
                var fallbacks = [correct + '（含）', correct.substr(0, Math.ceil(correct.length/2)), '以上均不是'];
                fallbacks.forEach(function(f) {
                    if (choices.indexOf(f) < 0 && choices.length < 4) choices.push(f);
                });
            }
        }
        // 打乱顺序
        for (var i = choices.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = choices[i]; choices[i] = choices[j]; choices[j] = tmp;
        }
        return choices;
    }

    var allAnswers = bs.steps.map(function(s) { return s.blank; });

    var stepsHtml = bs.steps.map(function(step, si) {
        var choices = generateChoices(step.blank, allAnswers);
        var letters = ['A','B','C','D'];
        var optsHtml = choices.map(function(c, ci) {
            return '<div class="step-choice-opt" data-step="'+si+'" data-choice="'+ci+'" data-correct="'+(c===step.blank?'1':'0')+'">' +
                '<span class="step-choice-letter">' + letters[ci] + '</span>' +
                '<span class="step-choice-text">' + c + '</span>' +
                '</div>';
        }).join('');
        return '<div class="blank-step-line">' +
            '<div class="step-text">' + step.before + '<span class="step-blank-marker">（？）</span>' + step.after + '</div>' +
            '<div class="step-choice-row">' + optsHtml + '</div>' +
            '<div class="step-feedback-inline" id="stepFeedback'+si+'" style="display:none;"></div>' +
            '</div>';
    }).join('');

    zone.innerHTML = `<div class="big-card">${typeBadge}<div class="blank-steps-section">
        <div class="blank-steps-title">✏️ ${bs.title || '选择正确步骤'}</div>
        ${stepsHtml}
        <button class="blank-check-btn" id="blankCheckBtn">✅ 提交答案</button>
        <div class="blank-feedback" id="blankFeedback" style="display:none;"></div>
    </div><div class="flip-hint"><i class="fas fa-lightbulb"></i> 每空选择一个正确答案</div></div>
    <div class="action-buttons" style="display:none;" id="stepsNextActions">
        <button class="btn-remember" id="stepsNextBtn"><i class="fas fa-arrow-right"></i> 下一题</button>
    </div>`;

    // 绑定选择题点击
    document.querySelectorAll('.step-choice-opt').forEach(function(opt) {
        opt.onclick = function() {
            var step = parseInt(this.dataset.step);
            // 取消同一步骤的其他选择
            document.querySelectorAll('.step-choice-opt[data-step="' + step + '"]').forEach(function(o) {
                o.classList.remove('selected', 'correct-choice', 'wrong-choice');
            });
            this.classList.add('selected');
        };
    });

    document.getElementById('blankCheckBtn').onclick = function() { checkStepsChoices(card, q, bs); };
    document.getElementById('stepsNextBtn').onclick = function() {
        var q2 = getTodayQueue(); q2.items = q2.items.filter(function(i) { return i !== card.id; });
        q2.doneToday = (q2.doneToday || 0) + 1; saveQueue(q2); recordStudy(); renderAll();
        if (q2.items.length === 0) setTimeout(function() { showDailySummary(); }, 500);
    };
}

function checkStepsChoices(card, q, bs) {
    var allCorrect = true; var feedbackParts = [];
    bs.steps.forEach(function(step, si) {
        var selected = document.querySelector('.step-choice-opt[data-step="' + si + '"].selected');
        var correctOpt = document.querySelector('.step-choice-opt[data-step="' + si + '"][data-correct="1"]');
        var fb = document.getElementById('stepFeedback' + si);
        if (!selected) {
            allCorrect = false;
            if (fb) { fb.style.display = 'block'; fb.className = 'step-feedback-inline fail';
                fb.innerHTML = '⚠️ 未选择（答案：' + step.blank + '）'; }
        } else if (selected.dataset.correct === '1') {
            if (fb) { fb.style.display = 'block'; fb.className = 'step-feedback-inline success';
                fb.innerHTML = '✅ 正确！'; }
            selected.classList.add('correct-choice');
        } else {
            allCorrect = false;
            if (fb) { fb.style.display = 'block'; fb.className = 'step-feedback-inline fail';
                fb.innerHTML = '❌ 错误（答案：' + step.blank + '）'; }
            selected.classList.add('wrong-choice');
            if (correctOpt) correctOpt.classList.add('correct-choice');
        }
        // 禁用该步骤所有选项
        document.querySelectorAll('.step-choice-opt[data-step="' + si + '"]').forEach(function(o) {
            o.style.pointerEvents = 'none';
        });
    });

    var fb = document.getElementById('blankFeedback'); fb.style.display = 'block';
    if (allCorrect) {
        fb.className = 'blank-feedback success'; fb.innerHTML = '🎉 全部正确！';
        document.getElementById('blankCheckBtn').disabled = true; document.getElementById('blankCheckBtn').style.display = 'none';
        document.getElementById('stepsNextActions').style.display = '';
        recordStudy(); // 步骤填空学习记录热力图
    } else {
        fb.className = 'blank-feedback fail'; fb.innerHTML = '💡 还有错误，请查看红色标记的选项';
    }
}

function handleResult(remembered) {
    if (!currentIdiomObj) return;
    let item = currentIdiomObj; let newIntervalIdx, mastered, nextReview; let forgetCount = item.forgetCount || 0;
    if (remembered) {
        if (item.intervalIdx >= INTERVALS.length - 1) { mastered = true; newIntervalIdx = item.intervalIdx; nextReview = item.nextReviewTime; }
        else { mastered = false; newIntervalIdx = item.intervalIdx + 1; nextReview = addDays(today(), INTERVALS[newIntervalIdx]); }
    } else { mastered = false; newIntervalIdx = 0; nextReview = addDays(today(), INTERVALS[0]); forgetCount++; }
    let updatedItem = updateIdiom(item.id, { mastered, intervalIdx: newIntervalIdx, studyCount: item.studyCount + 1, forgetCount, lastStudyTime: today(), nextReviewTime: nextReview });
    recordStudy();
    // Phase 1 双写：异步同步到后端，失败不影响本地
    syncToBackend(item.id, remembered ? (mastered ? 'mastered' : 'correct') : 'wrong');
    syncVocabStateToBackend(updatedItem);
    let q = getTodayQueue();
    if (currentMode === 'review') {
        q.items = q.items.filter(i => i !== item.id); q.doneToday = (q.doneToday || 0) + 1; saveQueue(q);
    } else if (activeModeItems) {
        activeModeItems = activeModeItems.filter(i => i !== item.id);
    }
    isFlipped = false; renderAll();
    if (currentMode === 'review' && q.items.length === 0) { setTimeout(() => showDailySummary(), 500); }
}

// 点击某月柱状图 → 进入该月详细视图（按列布局，每列独立容器）
function showHeatmapDetail(monthKey) {
    var rec = loadGlobalRecords();
    var parts = monthKey.split('-');
    var y = Number(parts[0]), m = Number(parts[1]);
    var firstDay = new Date(y, m - 1, 1);
    var lastDay = new Date(y, m, 0);
    var firstDow = (firstDay.getDay() + 6) % 7; // 转成周一=0
    // 初始化 7 列数据：null = 空白占位，数字 = 日期
    var colData = [[],[],[],[],[],[],[]];
    for (var i = 0; i < firstDow; i++) { colData[i].push(null); } // 月初空白
    for (var d = 1; d <= lastDay.getDate(); d++) {
        var dow = (new Date(y, m - 1, d).getDay() + 6) % 7;
        colData[dow].push(d);
    }
    // 按列生成 HTML
    var weekNames = ['一','二','三','四','五','六','日'];
    var tableHtml = '';
    for (var c = 0; c < 7; c++) {
        var colHtml = '<div class="detail-col"><span class="weekday-label">' + weekNames[c] + '</span>';
        for (var idx = 0; idx < colData[c].length; idx++) {
            var item = colData[c][idx];
            if (item === null) {
                colHtml += '<div class="heatmap-cell" style="background:transparent"></div>';
            } else {
                var ds = monthKey + '-' + String(item).padStart(2,'0');
                var cnt = rec[ds] || 0;
                var lv = 0;
                if (cnt >= 1) lv = 1; if (cnt >= 4) lv = 2; if (cnt >= 8) lv = 3; if (cnt >= 15) lv = 4;
                var isToday = (ds === today());
                var cls = 'heatmap-cell' + (lv > 0 ? ' level-' + lv : '') + (isToday ? ' today' : '');
                colHtml += '<div class="' + cls + '" title="' + ds + (isToday ? '（今天）' : '') + ': ' + cnt + '次学习"></div>';
            }
        }
        colHtml += '</div>';
        tableHtml += colHtml;
    }
    document.getElementById('heatmapDetailTable').innerHTML = tableHtml;

function exportAllData() {

function importAllData(file) {

    let reader = new FileReader();
    reader.onload = function(ev) {

            if (data[GLOBAL_RECORDS_KEY]) localStorage.setItem(GLOBAL_RECORDS_KEY, data[GLOBAL_RECORDS_KEY]);
            if (data[GLOBAL_STREAK_KEY]) localStorage.setItem(GLOBAL_STREAK_KEY, data[GLOBAL_STREAK_KEY]);
            if (data[CURRENT_DECK_KEY]) localStorage.setItem(CURRENT_DECK_KEY, data[CURRENT_DECK_KEY]);
            Object.keys(DECK_CONFIGS).forEach(type => {
                let prefix = DECK_CONFIGS[type].storagePrefix;
                if (data[prefix + 'data']) localStorage.setItem(prefix + 'data', data[prefix + 'data']);
                if (data[prefix + 'queue']) localStorage.setItem(prefix + 'queue', data[prefix + 'queue']);
                if (data[prefix + 'settings']) localStorage.setItem(prefix + 'settings', data[prefix + 'settings']);

function handleFileUpload(file) {
    if (typeof XLSX === 'undefined') { alert('Excel 解析库未加载，请刷新页面后重试。'); return; }
    if (getCurrentDeckType() !== 'idiom') { alert('词库上传仅支持成语牌组，请先切换到成语标签页。'); return; }
    let sourceName = prompt('请为这个词库取个名字：', '我的词库' + (new Date().toLocaleDateString('zh-CN')));
    if (!sourceName || !sourceName.trim()) return;
    sourceName = sourceName.trim();
    let reader = new FileReader();
    reader.onload = async function(ev) {
        try {
            let wb = XLSX.read(ev.target.result, { type: 'array' }); let ws = wb.Sheets[wb.SheetNames[0]];
            let rows = XLSX.utils.sheet_to_json(ws, { header: 1 }); let list = [];
            rows.forEach(row => { if (!row || row.length === 0) return; let idiom = (row[0] || '').trim(); if (!idiom) return; let meaning = row[1] ? String(row[1]).trim() : ''; list.push({ word: idiom, meaning: meaning || '暂无释义' }); });
            let seen = new Set(); list = list.filter(item => { if (seen.has(item.word)) return false; seen.add(item.word); return true; });
            if (list.length === 0) { alert('未找到有效数据（请确保第1列为成语名，第2列为释义）'); return; }
            // 上传到后端
            let isLoggedIn = gontu_isLoggedIn();
            let savedToBackend = false;
            if (isLoggedIn) {
                try {
                    let resp = await apiFetch(API_BASE + '/api/vocab/custom/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sourceName: sourceName, words: list })
                    });
                    if (resp.ok) {
                        let result = await resp.json();
                        console.log('词库已保存到后端：' + result.added + ' 条，' + result.skipped + ' 条重复');
                        savedToBackend = true;
                    }
                } catch(e) { console.warn('后端保存失败，仅本地生效：', e.message); }
            }
            let idiomList = list.map(w => ({ name: w.word, meaning: w.meaning }));
            let added = replaceIdiomsFromSource(idiomList);
            // 记录当前词库来源（按牌组分开存）
            localStorage.setItem('current_vocab_source_' + getCurrentDeckType(), 'custom:' + sourceName);
            // 刷新词库选择器
            loadVocabSources().then(() => {
                document.getElementById('vocabSourceSelect').value = 'custom:' + sourceName;
                updateVocabSourceUI();
            });
            let msg = '✅ 成功导入 ' + added + ' 条数据到词库「' + sourceName + '」';
            if (!savedToBackend) {
                msg += isLoggedIn ? '\n⚠️ 后端同步失败，仅保存在本地' : '\n⚠️ 未登录，仅保存在本地';
            }
            alert(msg);
            ensureTodayQueueReady();
            renderAll();
        } catch(e) { alert('Excel 解析失败：' + e.message + '\n\n请确保文件是 .xlsx 格式'); console.error(e); }
    };
    reader.readAsArrayBuffer(file);
}

async function fetchHighFreq(deckType) {
    var targetDeck = deckType || 'idiom';
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        let res = await apiFetch(API_BASE + '/api/verbal-catalog/vocab?limit=801', { signal: controller.signal });
        clearTimeout(timeout);
        if (res.ok) {
            let json = await res.json();
            let list = (json.items || []).map(item => ({ name: item.word, meaning: item.meaning, examples: Array.isArray(item.examples) ? item.examples.join('\n') : (item.examples || ''), search_url: item.search_url || '', source: '内置词库' }));
            let count = replaceIdiomsFromSource(list, targetDeck);
            if (targetDeck === getCurrentDeckType()) await applyVocabStateFromBackend();
            console.log('内置词库加载成功：' + count + ' 个成语，学习状态已保留');
        } else {
            throw new Error('Server returned ' + res.status);
        }
    } catch(e) {
        let mock = [
            { name: '因地制宜', meaning: '根据各地具体情况，制定适宜办法。' },
            { name: '未雨绸缪', meaning: '事先做好准备。' },
            { name: '举一反三', meaning: '从一件事物的情况、道理类推而知道许多事物的情况、道理。' },
            { name: '厚积薄发', meaning: '多多积蓄，慢慢放出。形容只有准备充分才能办好事情。' },
            { name: '相得益彰', meaning: '指两个人或两件事物互相配合，双方的能力和作用更能显示出来。' },
            { name: '推陈出新', meaning: '去掉旧事物的糟粕，取其精华，并使它向新的方向发展。' },
            { name: '融会贯通', meaning: '把各方面的知识和道理融化汇合，得到全面透彻的理解。' },
            { name: '博古通今', meaning: '对古代的事知道得很多，并且通晓现代的事情。形容知识丰富。' }
        ];
        if (targetDeck === getCurrentDeckType()) {
            let added = mergeIdioms(mock); console.log('网络失败，已导入示例成语 ' + added + ' 个');
        } else {
            console.warn('内置词库刷新失败：', e.message);
        }
    }
    if (targetDeck === getCurrentDeckType()) {
        ensureTodayQueueReady();
        renderAll();
        if (gontu_isLoggedIn()) pushCurrentDeckToBackend();
    } else if (targetDeck === 'idiom' && gontu_isLoggedIn()) {
        pushDeckToBackend('idiom');

// 当前词库来源：'builtin' | 'custom:XXX'
function getCurrentVocabSource(deckType) { var t = deckType || getCurrentDeckType(); return localStorage.getItem('current_vocab_source_' + t) || 'builtin'; }
function isCustomVocabSource() { return getCurrentVocabSource().startsWith('custom:'); }
function getCustomSourceName() { var s = getCurrentVocabSource(); return s.startsWith('custom:') ? s.slice(7) : ''; }

// 加载词库列表到下拉框
async function loadVocabSources() {
    var sel = document.getElementById('vocabSourceSelect');
    if (!sel) return;
    var current = getCurrentVocabSource();
    var deckType = getCurrentDeckType();
    sel.innerHTML = '<option value="builtin"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:-2px;margin-right:3px"><path d="M2.5 2.5h9v9h-9z" stroke="#c9a96e" stroke-width="1.1" rx="1"/><path d="M5 5.5h4M5 7.5h4M5 9.5h2.5" stroke="#c9a96e" stroke-width="0.8" stroke-linecap="round"/></svg>内置词库</option>';
    // 自定义词库仅成语牌组可用
    if (deckType === 'idiom' && gontu_isLoggedIn()) {
        try {
            var resp = await apiFetch(API_BASE + '/api/vocab/sources');
            if (resp.ok) {
                var sources = await resp.json();
                sources.forEach(function(s) {
                    if (s.id === 'builtin') {
                        sel.options[0].innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:-2px;margin-right:3px"><path d="M2.5 2.5h9v9h-9z" stroke="#c9a96e" stroke-width="1.1" rx="1"/><path d="M5 5.5h4M5 7.5h4M5 9.5h2.5" stroke="#c9a96e" stroke-width="0.8" stroke-linecap="round"/></svg>内置词库（' + s.count + '词）';
                    } else {
                        var opt = document.createElement('option');
                        opt.value = s.id;
                        opt.text = '📋 ' + s.name + '（' + s.count + '词）';
                        sel.appendChild(opt);
                    }
                });
            }
        } catch(e) { console.warn('加载词库列表失败：', e.message); }
    }
    // 如果当前选择的词库在当前牌组不可用（比如切到了math但之前选的是custom），回退到内置
    if (current.startsWith('custom:') && deckType !== 'idiom') {
        localStorage.setItem('current_vocab_source_' + deckType, 'builtin');
        current = 'builtin';
    }
    sel.value = current;
    updateVocabSourceUI();
}

// 更新词库相关 UI 状态
function updateVocabSourceUI() {
    var delBtn = document.getElementById('deleteVocabBtn');
    var uploadBtn = document.getElementById('excelUploadBtn');
    var fetchBtn = document.getElementById('fetchOnlineBtn');
    if (isCustomVocabSource()) {
        if (delBtn) delBtn.style.display = '';

    }

// 切换词库
async function switchVocabSource(sourceId) {
    var oldSource = getCurrentVocabSource();
    if (sourceId === oldSource) return;
    // 备份当前数据，加载失败时恢复
    var backupData = localStorage.getItem('idiom_data');
    var backupSource = getCurrentVocabSource();
    try {
        if (sourceId === 'builtin') {
            console.log('[Vocab] 切换到内置词库，加载中...');
            await fetchHighFreq();
        } else {
            var sourceName = sourceId.slice(7);
            console.log('[Vocab] 切换到自定义词库：' + sourceName);
            var loadResult = await loadCustomVocab(sourceName);
            if (loadResult === false) {
                // 未登录且无本地数据，恢复备份
                localStorage.setItem('idiom_data', backupData || '[]');
                document.getElementById('vocabSourceSelect').value = backupSource;
                return;
            }
        }
        // 加载成功，写入新词库来源（按牌组分开存）
        localStorage.setItem('current_vocab_source_' + getCurrentDeckType(), sourceId);
        updateVocabSourceUI();
        console.log('[Vocab] 已切换到：' + sourceId);
    } catch(e) {
        console.error('[Vocab] 切换词库失败：', e.message);
        // 恢复备份
        localStorage.setItem('idiom_data', backupData || '[]');
        alert('切换词库失败：' + e.message + '\n已恢复到原词库');
        document.getElementById('vocabSourceSelect').value = backupSource;
        return;
    }
    renderAll();
}

// 从后端加载自定义词库到本地
// 返回 true=成功，false=失败（未登录且无本地数据时为失败）
async function loadCustomVocab(sourceName) {
    if (!gontu_isLoggedIn()) {
        var localData = loadIdioms();
        if (localData.length > 0) {
            console.log('[Vocab] 未登录，使用本地已缓存的词库数据：' + localData.length + ' 个成语');
            ensureTodayQueueReady();
            return true;
        }
        return false;
    }
    var resp = await apiFetch(API_BASE + '/api/vocab/custom?source=' + encodeURIComponent(sourceName));
    if (!resp.ok) throw new Error('后端返回 ' + resp.status);
    var words = await resp.json();
    if (words.length === 0) { alert('词库「' + sourceName + '」为空'); return false; }
    var list = words.map(w => ({ name: w.word, meaning: w.meaning, examples: w.examples || '', search_url: w.search_url || '' }));
    var count = replaceIdiomsFromSource(list);
    await applyVocabStateFromBackend();
    console.log('自定义词库加载成功：' + count + ' 个成语，学习状态已保留');
    ensureTodayQueueReady();
    pushCurrentDeckToBackend();
    return true;
}

// 删除当前自定义词库
async function deleteCurrentCustomVocab() {
    if (!isCustomVocabSource()) return;
    var sourceName = getCustomSourceName();
    if (!confirm('⚠️ 确定要删除词库「' + sourceName + '」吗？\n此操作将删除该词库的所有数据，不可恢复！')) return;
    if (gontu_isLoggedIn()) {
        try {
            await apiFetch(API_BASE + '/api/vocab/custom?source=' + encodeURIComponent(sourceName), { method: 'DELETE' });
        } catch(e) { console.warn('后端删除失败：', e.message); }
    }
    // 切回内置词库（按牌组分开存）
    localStorage.setItem('current_vocab_source_' + getCurrentDeckType(), 'builtin');
    await loadVocabSources();
    await fetchHighFreq();
    renderAll();
    alert('词库「' + sourceName + '」已删除，已切回内置词库');
}

// 首次进入学习界面时自动加载词库（如果本地成语数据为空）
function autoLoadHighFreqIfNeeded() {
    if (getCurrentDeckType() !== 'idiom') return Promise.resolve();
    var data = loadIdioms();
    var source = getCurrentVocabSource();
    if (source === 'builtin') {
        console.log('[AutoLoad] 刷新内置词库，保留学习状态');
        vocabAutoLoading = data.length === 0;
        return fetchHighFreq('idiom').then(function() { loadVocabSources(); }).finally(function() { vocabAutoLoading = false; });
    }
    if (data.length === 0) {
        console.log('[AutoLoad] 本地成语为空，加载词库：' + source);
        vocabAutoLoading = true;
        return loadCustomVocab(source.slice(7)).then(function() { loadVocabSources(); }).finally(function() { vocabAutoLoading = false; });
    } else {
        return applyVocabStateFromBackend().then(function() { loadVocabSources(); });
    }
}

    updateVocabSourceUI();
})();

window.setLegacyLearningMode = function(mode, keepEmptyMode) {
    var btn = document.querySelector('#modeSwitchGroup .mode-btn[data-mode="' + mode + '"]');
    if (!btn) return currentMode;
    document.querySelectorAll('#modeSwitchGroup .mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); currentMode = mode;
    let data = loadIdioms();
    if (currentMode === 'recite') {
        activeModeItems = data.map(d => d.id);
    } else if (currentMode === 'difficult') {
        // 修复：forgetCount >= 1 即可进入错题攻克（之前 >= 2 太高了）
        let difficult = data.filter(d => !d.mastered && (d.forgetCount || 0) >= 1).map(d => d.id);
        if (difficult.length === 0 && !keepEmptyMode) { gontuToast('🎉 暂无错题需要攻克！继续加油~', 'success'); currentMode = 'review'; document.querySelectorAll('#modeSwitchGroup .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === 'review')); renderAll(); return currentMode; }
        activeModeItems = difficult;
    } else if (currentMode === 'steps') {
        let stepCards = data.filter(d => d.type === 'math' && d.blank_steps && d.blank_steps.steps && d.blank_steps.steps.length > 0).map(d => d.id);
        if (stepCards.length === 0 && !keepEmptyMode) { gontuToast('当前无可用步骤填空卡片', 'info'); currentMode = 'review'; document.querySelectorAll('#modeSwitchGroup .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === 'review')); renderAll(); return currentMode; }
        activeModeItems = stepCards;
    } else if (currentMode === 'quiz') {
        quizState = { idx: 0, score: 0, answered: false };
        activeModeItems = null;
    } else {
        activeModeItems = null;
        getTodayQueue();
    }
    isFlipped = false; renderAll();
    return currentMode;
};

document.getElementById('modeSwitchGroup').addEventListener('click', function(e) {

<!-- ── 轻量入场动效 Observer ── -->
<script>
(function(){
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var sel = '.animate-in, .feature-card, .mindmap-cat-card, .grading-feat';
    var els = document.querySelectorAll(sel);
    if (!els.length) return;
    els.forEach(function(el){ el.classList.add('animate-in','ready'); });
    var obs = new IntersectionObserver(function(entries){
        entries.forEach(function(e){
            if (e.isIntersecting) {
                e.target.classList.add('show');
                e.target.addEventListener('transitionend', function done(){
                    e.target.classList.add('done');
                    e.target.removeEventListener('transitionend', done);
                });
                obs.unobserve(e.target);
            }
        });
    }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
    els.forEach(function(el){ obs.observe(el); });
})();
</script>
