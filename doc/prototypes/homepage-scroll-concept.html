<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>公途首页 · 黑金画幅概念</title>
  <style>
    :root {
      color-scheme: dark;
      --night: #081019;
      --night-soft: #101b25;
      --ink: #17242d;
      --gold: #d8bd7a;
      --gold-light: #f1dfae;
      --paper: #f4eedf;
      --muted: #9aa6ad;
      --seal: #9f392f;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      overflow-x: hidden;
      color: var(--paper);
      background:
        radial-gradient(circle at 76% 22%, rgba(216, 189, 122, .11), transparent 26%),
        radial-gradient(circle at 13% 84%, rgba(74, 104, 119, .13), transparent 30%),
        var(--night);
      font-family: "PingFang SC", "Noto Sans SC", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -16%;
      pointer-events: none;
      opacity: .34;
      background:
        repeating-linear-gradient(90deg, transparent 0 9.9%, rgba(216, 189, 122, .035) 10% 10.08%),
        repeating-linear-gradient(0deg, transparent 0 19.9%, rgba(216, 189, 122, .025) 20% 20.08%);
      transform: rotate(-7deg);
      animation: drift 24s ease-in-out infinite alternate;
    }

    button { font: inherit; }

    .page {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 24px clamp(18px, 4vw, 64px) 18px;
      isolation: isolate;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      color: var(--muted);
      letter-spacing: .12em;
      font-size: 12px;
    }

    .brand { display: flex; align-items: center; gap: 12px; }

    .brand-seal {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 9px 5px 10px 6px;
      color: #182029;
      background: linear-gradient(145deg, var(--gold-light), #a78645);
      box-shadow: 0 8px 24px rgba(216, 189, 122, .16);
      font: 700 17px/1 "Songti SC", serif;
    }

    .brand strong {
      display: block;
      color: var(--paper);
      font: 600 19px/1.1 "Songti SC", "STSong", serif;
      letter-spacing: .18em;
    }

    .brand small { display: block; margin-top: 4px; }

    .demo-tag {
      border: 1px solid rgba(216, 189, 122, .22);
      padding: 8px 12px;
      border-radius: 999px;
    }

    .stage {
      position: relative;
      width: min(1280px, 100%);
      min-height: 680px;
      margin: 18px auto 10px;
      display: grid;
      place-items: center;
    }

    .intro {
      position: absolute;
      z-index: 5;
      width: min(680px, calc(100% - 28px));
      text-align: center;
      transition: opacity .45s ease, transform .55s cubic-bezier(.2,.8,.2,1);
    }

    .intro .eyebrow {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: .32em;
    }

    .intro h1 {
      margin: 20px 0 14px;
      font: 500 clamp(44px, 7vw, 82px)/1.04 "Songti SC", "STSong", serif;
      letter-spacing: .08em;
    }

    .intro h1 span {
      display: block;
      margin-top: 12px;
      color: rgba(244, 238, 223, .58);
      font-size: .38em;
      letter-spacing: .28em;
    }

    .intro p {
      max-width: 580px;
      margin: 0 auto 28px;
      color: var(--muted);
      line-height: 1.9;
    }

    .open-button {
      min-width: 170px;
      height: 50px;
      border: 1px solid rgba(216, 189, 122, .54);
      border-radius: 2px;
      color: #182029;
      background: linear-gradient(110deg, #efdca4, #b79755);
      cursor: pointer;
      letter-spacing: .14em;
      box-shadow: 0 16px 45px rgba(0, 0, 0, .28);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .open-button:hover { transform: translateY(-2px); box-shadow: 0 19px 52px rgba(0,0,0,.38); }
    .open-button:focus-visible, .chapter:focus-visible, .restart:focus-visible { outline: 2px solid var(--gold-light); outline-offset: 4px; }

    .gate {
      position: absolute;
      z-index: 4;
      top: 50%;
      width: 2px;
      height: min(530px, 72vh);
      opacity: .74;
      background: linear-gradient(transparent, var(--gold-light) 14%, var(--gold) 86%, transparent);
      box-shadow: 0 0 28px rgba(216, 189, 122, .46);
      transition: transform 1.15s cubic-bezier(.72,0,.18,1), opacity .5s ease .55s;
    }

    .gate.left { transform: translate(-8px, -50%); }
    .gate.right { transform: translate(8px, -50%); }

    .frame {
      position: relative;
      width: 100%;
      min-height: 610px;
      overflow: hidden;
      border: 1px solid rgba(216, 189, 122, .22);
      background:
        linear-gradient(90deg, rgba(255,255,255,.025), transparent 16% 84%, rgba(255,255,255,.025)),
        rgba(12, 21, 29, .86);
      box-shadow: 0 40px 110px rgba(0, 0, 0, .42), inset 0 1px rgba(255,255,255,.035);
      clip-path: inset(0 49.85%);
      opacity: .5;
      transition: clip-path 1.15s cubic-bezier(.72,0,.18,1), opacity .25s linear;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .24;
      background:
        radial-gradient(ellipse at 50% 4%, rgba(216,189,122,.23), transparent 36%),
        linear-gradient(115deg, transparent 0 46%, rgba(216,189,122,.09) 46.2% 46.5%, transparent 46.8%);
    }

    .frame-head {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 26px;
      padding: 42px 44px 28px;
      border-bottom: 1px solid rgba(216, 189, 122, .14);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .55s ease 1.02s, transform .6s ease 1.02s;
    }

    .frame-kicker { color: var(--gold); font-size: 11px; letter-spacing: .28em; }

    .frame-head h2 {
      margin: 8px 0 0;
      font: 500 clamp(30px, 4vw, 50px)/1.12 "Songti SC", "STSong", serif;
      letter-spacing: .08em;
    }

    .frame-head p {
      max-width: 490px;
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 14px;
    }

    .chapters {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 8px;
      padding: 18px;
      min-height: 405px;
    }

    .chapter {
      --delay: 1.14s;
      position: relative;
      flex: .82;
      min-width: 0;
      padding: 28px 22px 24px;
      overflow: hidden;
      border: 1px solid rgba(216, 189, 122, .12);
      border-radius: 2px;
      color: var(--paper);
      text-align: left;
      background: rgba(255,255,255,.018);
      cursor: pointer;
      opacity: 0;
      transform: translateY(24px);
      transition:
        flex .48s cubic-bezier(.2,.8,.2,1),
        background .35s ease,
        border-color .35s ease,
        opacity .55s ease var(--delay),
        transform .55s ease var(--delay);
    }

    .chapter:nth-child(2) { --delay: 1.22s; }
    .chapter:nth-child(3) { --delay: 1.30s; }
    .chapter:nth-child(4) { --delay: 1.38s; }
    .chapter:nth-child(5) { --delay: 1.46s; }

    .chapter::after {
      content: "";
      position: absolute;
      inset: auto 20px 0;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
      opacity: .18;
      transition: opacity .3s ease, inset .3s ease;
    }

    .chapter:hover, .chapter.active {
      flex: 1.42;
      border-color: rgba(216, 189, 122, .34);
      background: linear-gradient(180deg, rgba(216,189,122,.10), rgba(255,255,255,.022));
    }

    .chapter:hover::after, .chapter.active::after { inset-inline: 0; opacity: .72; }

    .chapter-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      margin-bottom: 54px;
      border: 1px solid rgba(216,189,122,.34);
      color: var(--gold-light);
      font: 500 22px/1 "Songti SC", serif;
      transform: rotate(-3deg);
    }

    .chapter small { color: rgba(216,189,122,.68); letter-spacing: .18em; font-size: 10px; }

    .chapter h3 {
      margin: 10px 0 8px;
      white-space: nowrap;
      font: 500 clamp(20px, 2vw, 30px)/1.2 "Songti SC", "STSong", serif;
      letter-spacing: .08em;
    }

    .chapter p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
    }

    .chapter ul {
      margin: 18px 0 0;
      padding: 0;
      list-style: none;
      color: rgba(244,238,223,.84);
      font-size: 12px;
      line-height: 2;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .28s ease, transform .28s ease;
    }

    .chapter.active ul, .chapter:hover ul { opacity: 1; transform: none; }
    .chapter li::before { content: "—"; color: var(--gold); margin-right: 7px; }

    .restart {
      position: absolute;
      z-index: 4;
      right: 20px;
      top: 20px;
      border: 0;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      opacity: 0;
      transition: color .2s ease, opacity .4s ease 1.6s;
    }

    .restart:hover { color: var(--gold-light); }

    .caption {
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      color: #75828b;
      font-size: 11px;
      letter-spacing: .08em;
    }

    body.open .intro { opacity: 0; transform: translateY(-18px) scale(.98); pointer-events: none; }
    body.open .gate.left { transform: translate(calc(-50vw + 54px), -50%); opacity: .28; }
    body.open .gate.right { transform: translate(calc(50vw - 54px), -50%); opacity: .28; }
    body.open .frame { clip-path: inset(0); opacity: 1; }
    body.open .frame-head, body.open .chapter { opacity: 1; transform: none; }
    body.open .restart { opacity: 1; }

    @keyframes drift { to { transform: rotate(-7deg) translate3d(2.5%, -1.5%, 0); } }

    @media (max-width: 820px) {
      .page { padding-inline: 14px; }
      .demo-tag { display: none; }
      .stage { min-height: 820px; }
      .frame { min-height: 760px; }
      .frame-head { align-items: start; flex-direction: column; padding: 34px 24px 22px; }
      .chapters { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); min-height: 530px; }
      .chapter, .chapter:hover, .chapter.active { min-height: 158px; padding: 18px; }
      .chapter:last-child { grid-column: 1 / -1; }
      .chapter-mark { width: 34px; height: 34px; margin-bottom: 18px; font-size: 18px; }
      .chapter h3 { font-size: 20px; }
      .chapter p { font-size: 12px; }
      .chapter ul { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; scroll-behavior: auto !important; transition-duration: .01ms !important; transition-delay: 0ms !important; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <span class="brand-seal">公</span>
        <span><strong>公 途</strong><small>考公备考智学平台</small></span>
      </div>
      <span class="demo-tag">首页动效概念 · 不影响正式页面</span>
    </header>

    <section class="stage" aria-label="首页卷轴动效演示">
      <div class="intro">
        <div class="eyebrow">ONE LEARNING DESK · FIVE PATHS</div>
        <h1>公途·上岸<span>每一次练习，都留下下一步</span></h1>
        <p>这不是传统黄纸卷轴，而是一幅黑金学习画幅。点击后只展开一次，真实模块依次出现。</p>
        <button class="open-button" type="button" id="openDemo">展开学习画幅</button>
      </div>

      <i class="gate left" aria-hidden="true"></i>
      <i class="gate right" aria-hidden="true"></i>

      <div class="frame">
        <button class="restart" type="button" id="restartDemo">重新观看</button>
        <header class="frame-head">
          <div>
            <div class="frame-kicker">公途学习面板 · 五个真实入口</div>
            <h2>今天，从哪一科继续？</h2>
          </div>
          <p>训练、批改、复盘和问西西都回到同一个学习面板。点击任一章节，查看这一科当前真实内容。</p>
        </header>

        <div class="chapters" aria-label="学习模块">
          <button class="chapter active" type="button">
            <span class="chapter-mark">言</span><small>VERBAL</small><h3>言语理解</h3>
            <p>从词语积累到真实套题。</p>
            <ul><li>逻辑填空</li><li>片段阅读</li><li>限时套题与复盘</li></ul>
          </button>
          <button class="chapter" type="button">
            <span class="chapter-mark">数</span><small>QUANTITY</small><h3>数量关系</h3>
            <p>先识别，再列式，再核对。</p>
            <ul><li>单题诊断</li><li>套题策略</li><li>题型与步骤填空</li></ul>
          </button>
          <button class="chapter" type="button">
            <span class="chapter-mark">图</span><small>REASONING</small><h3>图形推理</h3>
            <p>平面规律与立体空间并行。</p>
            <ul><li>规律思维导图</li><li>三视图训练</li><li>自由切面与组合体</li></ul>
          </button>
          <button class="chapter" type="button">
            <span class="chapter-mark">申</span><small>ESSAY</small><h3>申论批改</h3>
            <p>完整题目、正式批改与追踪。</p>
            <ul><li>真实题库</li><li>问题追踪</li><li>Word / PDF 导出</li></ul>
          </button>
          <button class="chapter" type="button">
            <span class="chapter-mark">西</span><small>AI COACH</small><h3>问西西</h3>
            <p>带着当前题目继续追问。</p>
            <ul><li>当前题上下文</li><li>历史对话</li><li>跨模块学习建议</li></ul>
          </button>
        </div>
      </div>
    </section>

    <footer class="caption"><span>概念重点：一次展开 · 章节显影 · 轻微悬停</span><span>无黄纸 · 无木轴 · 无古风装饰堆叠</span></footer>
  </main>

  <script>
    const openButton = document.getElementById('openDemo');
    const restartButton = document.getElementById('restartDemo');
    const chapters = [...document.querySelectorAll('.chapter')];

    function openDemo() { document.body.classList.add('open'); }
    function restartDemo() {
      document.body.classList.remove('open');
      chapters.forEach((chapter, index) => chapter.classList.toggle('active', index === 0));
    }

    openButton.addEventListener('click', openDemo);
    restartButton.addEventListener('click', restartDemo);
    chapters.forEach(chapter => chapter.addEventListener('click', () => {
      chapters.forEach(item => item.classList.toggle('active', item === chapter));
    }));
  </script>
</body>
</html>
