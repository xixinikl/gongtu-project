name: 每日验收

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "验收日期 YYYY-MM-DD，留空则使用当天"
        required: false
        default: ""
  schedule:
    # GitHub cron uses UTC. 22:40 UTC is 06:40 Asia/Shanghai.
    - cron: "40 22 * * *"

permissions:
  contents: read
  actions: read

jobs:
  daily-acceptance:
    name: 公途每日 L0 验收
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 解析验收日期
        id: date
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            echo "value=${{ github.event.inputs.target_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: 安装后端依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: 运行每日验收
        id: acceptance
        continue-on-error: true
        run: |
          bash .agent-factory/scripts/daily-check.sh --date "${{ steps.date.outputs.value }}"

      - name: 生成人类日报
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          date = "${{ steps.date.outputs.value }}"
          out = Path(".agent-factory/out") / date
          scope_path = out / "scope.json"
          checks_path = out / "checks.json"
          risk_path = out / "risk.json"
          report_path = out / "daily-report.md"

          def load(path, default):
              if path.exists():
                  return json.loads(path.read_text())
              return default

          scope = load(scope_path, {})
          checks = load(checks_path, {"results": []})
          risk = load(risk_path, {})

          failed = [r for r in checks.get("results", []) if r.get("exitCode") != 0]
          high_risk = risk.get("highRiskFiles", [])
          if failed:
              verdict = "fail"
              verdict_cn = "不通过"
          elif high_risk:
              verdict = "conditional"
              verdict_cn = "有条件通过"
          else:
              verdict = "pass"
              verdict_cn = "通过"

          def bullet(items, empty="无"):
              return "\n".join(f"- {x}" for x in items) if items else f"- {empty}"

          check_lines = []
          for r in checks.get("results", []):
              ok = "PASS" if r.get("exitCode") == 0 else "FAIL"
              check_lines.append(
                  f"{ok} `{r.get('name')}` exit={r.get('exitCode')}，日志摘录 `{r.get('excerptPath')}`"
              )

          failed_lines = [
              f"`{r.get('name')}`: exit={r.get('exitCode')}，先看 `{r.get('excerptPath')}`"
              for r in failed
          ]

          text = f"""# 公途每日验收报告 - {date}

## 总结论

- Verdict: `{verdict}`（{verdict_cn}）
- 验收日期: {date}
- 测试提交: `{str(scope.get('testedSha', ''))[:12]}`
- 基线分支: `{scope.get('baseBranch', 'main')}`
- 建议深度: `{risk.get('recommendedLevel', 'L0')}`

## 今天检查了什么

{bullet(check_lines)}

## 变更范围

- 当日提交数: {scope.get('commitCount', 0)}
- 变更文件数: {scope.get('changedFileCount', 0)}
- 工作区状态条目: {len(scope.get('trackedStatus', []))}

## 失败与影响

{bullet(failed_lines)}

## 高风险变更

{bullet(high_risk)}

## 自动修复建议

{bullet(risk.get('autofixableFailedChecks', []), '今天没有低风险自动修复项')}

## 未覆盖与下一步

- 本日报是 L0 每日验收，主要覆盖静态检查、类型检查、安全扫描、跨平台基础测试和 Python 编译。
- 浏览器真实点击、桌面端真实启动、AI 批改真实调用不在每日 L0 范围内。
- 如果出现重复失败或高风险模块失败，应整理到 `doc/retrospectives/`，并开修复 PR。

## 给 Codex 的压缩摘要

详见同目录 `codex-summary.md`。Codex 应先读摘要，再按失败项读取日志摘录，避免读取全仓库和完整日志。
"""
          out.mkdir(parents=True, exist_ok=True)
          report_path.write_text(text)
          print(text)
          PY

      - name: 上传每日验收报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gongtu-daily-acceptance-${{ steps.date.outputs.value }}
          path: .agent-factory/out/${{ steps.date.outputs.value }}/
          retention-days: 30

      - name: 根据验收结果标记 workflow
        if: always()
        run: |
          CHECKS=".agent-factory/out/${{ steps.date.outputs.value }}/checks.json"
          if [ ! -f "$CHECKS" ]; then
            echo "checks.json 不存在，验收链路失败"
            exit 1
          fi
          python - <<'PY'
          import json
          from pathlib import Path
          checks = json.loads(Path(".agent-factory/out/${{ steps.date.outputs.value }}/checks.json").read_text())
          failed = checks.get("failedCount", 0)
          if failed:
              raise SystemExit(f"{failed} checks failed")
          PY

