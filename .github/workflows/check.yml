name: 代码检查

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - feature/spatial-geometry-lab
      - feature/spatial-geometry-agent2

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: 安装前端依赖
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: 检查 JavaScript 语法
        shell: bash
        run: |
          files=("_verify.js" "desktop/main.js")
          if [[ -d "geometry" ]]; then
            while IFS= read -r file; do
              files+=("$file")
            done < <(find geometry -type f -name '*.js' -print)
          fi

          for file in "${files[@]}"; do
            echo "Checking ${file}"
            node --check "$file"
          done

      - name: 检查前端依赖树
        run: npm run deps:check

      - name: 运行空间几何生成器测试
        run: npm run test:geometry

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: 安装 Ruff
        run: pip install ruff

      - name: 静态检查 (Ruff)
        run: ruff check backend/ --select=E,F --ignore=E501

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: 安装 mypy
        run: pip install mypy

      - name: 类型检查 (mypy)
        run: mypy backend/ --ignore-missing-imports --follow-imports=skip --disable-error-code var-annotated

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: 安装 Bandit
        run: pip install bandit

      - name: 安全检查 (Bandit)
        run: bandit -r backend/ -ll --exclude '**/venv/**'
