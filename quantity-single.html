<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>数量关系 · 单题诊断｜公途</title><link rel="stylesheet" href="/gontu-v3-shell.css?v=20260714"><script defer src="/gontu-v3-shell.js?v=20260714"></script><link rel="stylesheet" href="/quantity-learning.css?v=20260714"></head><body><main class="q-page"><header class="q-hero"><div><div class="q-eyebrow">数量关系 · 单题诊断</div><h1>一道题，完整走一遍</h1><p>先识别题型和取舍，再写关键步骤，最后核对答案与原题解析。这里不会偷偷变成十题套题。</p></div><a class="q-btn secondary" href="/quantity-review.html">查看我的复盘</a></header><div id="error" class="q-error" hidden></div><section class="q-grid"><article class="q-panel q-card"><div id="start"><div class="q-field"><label for="topic">选择专项（也可按推荐顺序开始）</label><select id="topic"><option value="">自动选择最值得先做的题型</option></select></div><button id="startBtn" class="q-btn">开始一道真实题</button></div><div id="practice" hidden><div id="meta" class="q-meta"></div><div id="stem" class="q-stem"></div><div id="options" class="q-options"></div><div class="q-field"><label for="workNote">写下你的关键思路或算式</label><textarea id="workNote" placeholder="例如：识别为工程问题；设总量为……；关键关系是……"></textarea></div><div class="q-field"><label for="stuck">这一步卡在哪里</label><select id="stuck"><option value="">暂未卡住</option><option>题型识别</option><option>取舍判断</option><option>设量建模</option><option>列式关系</option><option>计算速度</option><option>审题遗漏</option></select></div><div class="q-actions"><button id="submitBtn" class="q-btn" disabled>提交这一题</button><span id="timer" class="q-muted">00:00</span></div><div id="result" class="q-result" hidden></div></div></article><aside class="q-panel q-card"><div class="q-eyebrow">本题学习顺序</div><div class="q-list"><div class="q-row"><div><strong>01 识别</strong><span>从题干信号判断题型</span></div></div><div class="q-row"><div><strong>02 取舍</strong><span>先看值不值得做，再计算</span></div></div><div class="q-row"><div><strong>03 写步骤</strong><span>留下关键设量与关系式</span></div></div><div class="q-row"><div><strong>04 核对</strong
