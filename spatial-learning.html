<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>立体图推学习中心 · 公途</title><link rel="stylesheet" href="/spatial-learning-shell.css"><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--sp-ink);background:radial-gradient(circle at 12% 8%,rgba(216,183,119,.2),transparent 34%),var(--sp-paper);font-family:"PingFang SC","Microsoft YaHei",sans-serif}.top{display:flex;align-items:center;justify-content:space-between;padding:18px clamp(18px,5vw,70px);border-bottom:1px solid var(--sp-line);background:rgba(255,253,248,.88)}.brand{color:inherit;text-decoration:none;font-size:22px;font-weight:800}.brand small{display:block;color:var(--sp-soft);font-size:12px;font-weight:500}.shell{width:min(1120px,calc(100% - 32px));margin:42px auto}.intro{display:grid;grid-template-columns:1.4fr .8fr;gap:20px}.card{padding:clamp(22px,4vw,42px);border:1px solid var(--sp-line);border-radius:20px;background:rgba(255,253,248,.92);box-shadow:0 16px 55px rgba(63,47,28,.09)}h1{font-size:clamp(30px,5vw,52px);margin:8px 0 16px}.muted{color:var(--sp-soft);line-height:1.8}.continue{display:inline-flex;margin-top:20px;padding:12px 20px;border-radius:12px;background:var(--sp-teal);color:#fff;text-decoration:none;font-weight:700}.path{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:20px}.module{display:flex;min-height:190px;flex-direction:column;padding:22px;border:1px solid var(--sp-line);border-radius:18px;background:#fffdf8;color:inherit;text-decoration:none}.module b{color:var(--sp-gold);font-size:13px}.module h2{margin:16px 0 8px;font-size:22px}.module p{margin:0;color:var(--sp-soft);line-height:1.65}.module span{margin-top:auto;color:var(--sp-teal);font-weight:700}.facts{display:grid;gap:16px}.facts strong{font-size:28px}.facts span{color:var(--sp-soft)}@media(max-width:800px){.intro{grid-template-columns:1fr}.path{grid-template-columns:1fr 1fr}}@media(max-width:520px){.path{grid-template-columns:1fr}.shell{margin-top:22px}.top{align-items:flex-start}}
</style></head><body><header class="top"><a class="brand" href="/app">公途<small>立体图推学习中心</small></a><a class="spatial-center-link" href="/app">返回学习页</a></header><main class="shell"><section class="intro"><article class="card"><p>按空间认知顺序学习</p><h1>先看懂，再判断，最后自己验证</h1><p class="muted">四段主链保留各自最适合学习与操作的布局。三视图记录真实答案与用时；实验只记录完成任务和最近位置，不把探索伪装成正确率。</p><a id="continue-link" class="continue" href="/section-foundation.html">从基础截面开始</a></article><aside class="card facts"><div><strong id="completed-count">0 / 4</strong><br><span>已完成模块</span></div><div><strong id="last-label">尚未开始</strong><br><span>最近学习</span></div></aside></section><nav id="learning-path" class="path" aria-label="推荐学习路径"></nav></main><script type="module">
const catalog=await fetch('/data/spatial-learning-modules.json').then(r=>r.json());const path=document.querySelector('#learning-path');for(const item of catalog.modules){const a=document.createElement('a');a.className='module';a.href=item.href;a.innerHTML=`<b>第 ${item.order} 段</b><h2>${item.title}</h2><p>${item.description}</p><span>进入学习 →</span>`;path.append(a)}let last=null;try{last=JSON.parse(localStorage.getItem('gongtu.spatial.preview.last')||'null')}catch{}if(last){const item=catalog.modules.find(x=>x.id===last.moduleId);if(item){document.querySelector('#continue-link').href=item.href;document.querySelector('#continue-link').textContent=`继续：${item.title}`;document.querySelector('#last-label').textContent=item.title}}
</script><script src="/gontu-auth-client.js"></script><script type="module">
if(window.GontuAuth?.token()){const r=await window.GontuAuth.request('/api/spatial-learning/overview');if(r.ok){const o=await r.json();document.querySelector('#completed-count').textContent=`${o.completed_count} / 4`;if(o.last){const item=catalog.modules.find(x=>x.id===o.last.stage_id);if(item){document.querySelector('#continue-link').href=item.href;document.querySelector('#continue-link').textContent=`继续：${item.title}`;document.querySelector('#last-label').textContent=item.title}}}}
</script><script src="/gontu-auth-client.js"></script><script type="module">
const auth=window.GontuAuth;
if(auth?.token()){
  try{
    const response=await auth.request('/api/spatial-learning/overview');
    if(!response.ok) throw Object.assign(new Error('空间进度读取失败'),{status:response.status});
    const overview=await response.json();
    const catalog=await fetch('/data/spatial-learning-modules.json').then(r=>r.json());
    document.querySelector('#completed-count').textContent=`${overview.completed_count} / 4`;
    if(overview.last){
      const item=catalog.modules.find(entry=>entry.id===overview.last.stage_id);
      if(item){
        document.querySelector('#last-label').textContent=item.title;
        document.querySelector('#continue-link').href=item.href;
        document.querySelector('#continue-link').textContent=`继续：${item.title}`;
      }
    }
  }catch(error){
    if(error?.status===401) auth.clearIdentity();
  }
}
</script></body></html>
